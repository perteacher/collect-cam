<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0e0f13" />
<title>채집 카메라</title>
<style>
  :root {
    --bg: #0e0f13;
    --panel: #16181f;
    --panel-2: #1d2029;
    --line: #2a2e3a;
    --accent: #7CFFB2;
    --accent-2: #28c97a;
    --text: #e8ebf2;
    --muted: #9aa1b1;
    --danger: #ff6b6b;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
  }

  #app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
  }

  /* ===== Camera stage ===== */
  #stage {
    position: relative;
    flex: 1 1 auto;
    min-height: 0;
    overflow: hidden;
    background: #000;
  }

  #video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* dimmed mask outside the reticle */
  #mask {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: rgba(0,0,0,0.35);
    -webkit-mask:
      linear-gradient(#000 0 0) content-box,
      linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
  }

  /* Reticle frame (centered square-ish) */
  #reticle {
    position: absolute;
    left: 50%;
    top: 46%;
    transform: translate(-50%, -50%);
    width: min(72vw, 320px);
    height: min(72vw, 320px);
    border-radius: 18px;
    pointer-events: none;
    box-shadow: 0 0 0 100vmax rgba(0,0,0,0.34);
  }
  #reticle::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 18px;
    border: 2px solid rgba(124,255,178,0.0);
  }
  /* corner brackets */
  .corner {
    position: absolute;
    width: 28px;
    height: 28px;
    border: 3px solid var(--accent);
    border-radius: 4px;
  }
  .corner.tl { top: -2px; left: -2px; border-right: none; border-bottom: none; border-top-left-radius: 14px; }
  .corner.tr { top: -2px; right: -2px; border-left: none; border-bottom: none; border-top-right-radius: 14px; }
  .corner.bl { bottom: -2px; left: -2px; border-right: none; border-top: none; border-bottom-left-radius: 14px; }
  .corner.br { bottom: -2px; right: -2px; border-left: none; border-top: none; border-bottom-right-radius: 14px; }

  #reticle .hint {
    position: absolute;
    left: 50%;
    bottom: -34px;
    transform: translateX(-50%);
    white-space: nowrap;
    font-size: 13px;
    color: var(--muted);
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }

  /* Counter badge */
  #counter {
    position: absolute;
    top: calc(env(safe-area-inset-top, 0px) + 14px);
    left: 14px;
    z-index: 5;
    background: rgba(20,22,28,0.72);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  #counter b { color: var(--accent); }

  /* Flash overlay */
  #flash {
    position: absolute;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 9;
  }
  #flash.fire {
    animation: flash 360ms ease-out;
  }
  @keyframes flash {
    0% { opacity: 0; }
    8% { opacity: 0.85; }
    100% { opacity: 0; }
  }

  /* ===== Controls ===== */
  #controls {
    position: relative;
    z-index: 6;
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 14px 22px calc(14px + env(safe-area-inset-bottom, 0px));
    background: linear-gradient(180deg, rgba(14,15,19,0.0), rgba(14,15,19,0.9) 40%, var(--bg));
  }

  #spacerLeft { width: 64px; height: 64px; flex: 0 0 auto; }

  /* Capture button */
  #captureBtn {
    flex: 0 0 auto;
    width: 84px; height: 84px;
    border-radius: 50%;
    border: none;
    background: radial-gradient(circle at 50% 38%, var(--accent), var(--accent-2));
    color: #06210f;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 0 0 6px rgba(124,255,178,0.14), 0 8px 18px rgba(0,0,0,0.5);
    transition: transform 90ms ease;
  }
  #captureBtn:active { transform: scale(0.92); }
  #captureBtn:disabled { opacity: 0.5; cursor: default; }

  /* 채집물(inventory) open button — bottom-right corner */
  #invBtn {
    position: relative;
    flex: 0 0 auto;
    width: 64px; height: 64px;
    border-radius: 16px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #invBtn:active { background: #262a35; }
  #invBadge {
    position: absolute;
    top: -6px; right: -6px;
    min-width: 22px; height: 22px;
    padding: 0 6px;
    border-radius: 999px;
    background: var(--accent);
    color: #06210f;
    font-size: 12px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    transform-origin: center;
  }
  #invBadge.bump { animation: badgeBump 320ms cubic-bezier(.18,1.5,.5,1); }
  @keyframes badgeBump {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); }
    100% { transform: scale(1); }
  }

  /* ===== Inventory overlay (채집물) — physics pile ===== */
  #inventory {
    position: fixed;
    inset: 0;
    z-index: 40;
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.012) 0 12px, rgba(255,255,255,0) 12px 24px),
      var(--panel);
    display: none;
    flex-direction: column;
  }
  #inventory.show { display: flex; }
  #invHeader {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: calc(env(safe-area-inset-top, 0px) + 14px) 18px 12px;
    z-index: 2;
  }
  #invTitle { font-size: 17px; font-weight: 800; letter-spacing: 0.3px; }
  #invTitle small { color: var(--muted); font-weight: 600; font-size: 13px; margin-left: 6px; }
  #invHeader .btns { display: flex; gap: 10px; }
  #invClearBtn, #invCloseBtn {
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  #invClearBtn { background: var(--panel-2); color: var(--muted); }
  #invClearBtn:active { background: #262a35; }
  #invCloseBtn { background: var(--accent); color: #06210f; border-color: transparent; }

  #invViewport {
    position: relative;
    flex: 1 1 auto;
    min-height: 0;
    overflow: hidden;
  }
  #invCanvas { position: absolute; inset: 0; display: block; }

  /* fallback static grid */
  #invGrid {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 12px 12px calc(12px + env(safe-area-inset-bottom, 0px));
    display: none;
    flex-wrap: wrap;
    align-content: flex-start;
    gap: 10px;
    -webkit-overflow-scrolling: touch;
  }
  #invGrid.show { display: flex; }
  .gridItem {
    width: 84px;
    height: 84px;
    border-radius: 12px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex: 0 0 auto;
  }
  .gridItem img { max-width: 90%; max-height: 90%; object-fit: contain; }

  #invEmpty {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
  }
  #invEmpty.show { display: flex; }

  /* ===== Overlay (errors / guidance) ===== */
  #overlay {
    position: fixed;
    inset: 0;
    z-index: 50;
    background: rgba(8,9,12,0.92);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 28px;
    text-align: center;
  }
  #overlay.show { display: flex; }
  #overlay .card {
    max-width: 360px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 28px 24px;
  }
  #overlay h2 { margin: 0 0 12px; font-size: 19px; }
  #overlay p { margin: 0 0 18px; color: var(--muted); font-size: 14px; line-height: 1.6; }
  #overlay button {
    background: var(--accent);
    color: #06210f;
    border: none;
    border-radius: 12px;
    padding: 12px 22px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  #overlay .emoji { font-size: 40px; margin-bottom: 10px; }

  @media (prefers-reduced-motion: reduce) {
    #flash.fire { animation-duration: 120ms; }
    #invBadge.bump { animation: none; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <video id="video" playsinline webkit-playsinline muted autoplay></video>
    <div id="reticle">
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>
      <span class="hint">대상을 가운데 맞추고 채집</span>
    </div>
    <div id="counter">채집 <b id="count">0</b></div>
    <div id="flash"></div>
  </div>

  <div id="controls">
    <div id="spacerLeft"></div>
    <button id="captureBtn">채집</button>
    <button id="invBtn" title="채집물">
      채집물
      <span id="invBadge">0</span>
    </button>
  </div>
</div>

<!-- 채집물(inventory) full overlay -->
<div id="inventory">
  <div id="invHeader">
    <div id="invTitle">채집물 <small id="invCountLabel">0개</small></div>
    <div class="btns">
      <button id="invClearBtn" title="비우기">비우기</button>
      <button id="invCloseBtn" title="닫기">닫기</button>
    </div>
  </div>
  <div id="invViewport">
    <canvas id="invCanvas"></canvas>
    <div id="invGrid"></div>
    <div id="invEmpty">아직 채집한 것이 없어요</div>
  </div>
</div>

<div id="overlay">
  <div class="card">
    <div class="emoji">📷</div>
    <h2 id="ovTitle">카메라를 준비 중…</h2>
    <p id="ovMsg">잠시만 기다려 주세요.</p>
    <button id="ovBtn" style="display:none">다시 시도</button>
  </div>
</div>

<!-- Matter.js (physics) — pinned version, CDN. Fallback to static grid if blocked. -->
<script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
<script>
"use strict";

/* =========================================================
   채집 카메라 — 단일 파일 바닐라 웹앱
   배경 제거: 다중-에지 샘플 + LAB 거리 플러드필 (ML 없음, 오프라인 즉시)
   채집물: Matter.js 중력 물리 더미(겹침 없는 충돌 적층), 폴백=정적 그리드
   ========================================================= */

// ---- 튜닝 상수 (배경 제거) ----
const MAX_DIM = 640;        // 처리 캔버스 긴 변 길이(px). 성능/품질 균형.
// TOLERANCE: LAB(ΔE 유사) 스케일로 재조정. RGB의 36과 달리 LAB는 ΔE 단위라 작게.
// 일반 단색 배경 기준 ~14 전후가 적당(클수록 더 많이 지움). LAB용으로 14 선택.
const TOLERANCE = 14;
const EDGE_SAMPLES = 12;        // 각 변에서 뽑는 배경 색 샘플 개수(코너 포함). 배경 색 모델 크기.
const FEATHER_PX = 1;           // 알파 경계 페더(블러) 반경(px). 1~2 권장.
const MIN_BLOB_PX = 24;         // 이보다 작은 전경 연결성분(speck)은 제거.
const HOLE_MAX_PX = Infinity;   // 전경에 완전히 둘러싸인 배경 구멍은 전부 메움(내부 안 뚫리게).
const MIN_OBJECT_RATIO = 0.004; // 남은 객체가 이 비율보다 작으면 "검출 실패"로 간주

// ---- 튜닝 상수 (물리) ----
const PHYS_MAX_DIM = 110;   // 채집물 한 개의 화면상 최대 변(px). 큰 컷아웃이 화면 장악 방지.
const PHYS_MIN_DIM = 40;    // 너무 작은 컷아웃도 최소 이 정도로 키워 충돌 안정화.
const DROP_STAGGER_MS = 130;// 한 개씩 떨어뜨리는 간격(캐스케이드).
const WALL_THICK = 80;      // 정적 벽/바닥 두께(px).

// ---- DOM ----
const video      = document.getElementById("video");
const stage      = document.getElementById("stage");
const reticleEl  = document.getElementById("reticle");
const captureBtn = document.getElementById("captureBtn");
const countEl    = document.getElementById("count");
const flashEl    = document.getElementById("flash");
const overlay    = document.getElementById("overlay");
const ovTitle    = document.getElementById("ovTitle");
const ovMsg      = document.getElementById("ovMsg");
const ovBtn      = document.getElementById("ovBtn");

const invBtn       = document.getElementById("invBtn");
const invBadge     = document.getElementById("invBadge");
const inventoryEl  = document.getElementById("inventory");
const invViewport  = document.getElementById("invViewport");
const invCanvas    = document.getElementById("invCanvas");
const invGrid      = document.getElementById("invGrid");
const invEmpty     = document.getElementById("invEmpty");
const invClearBtn  = document.getElementById("invClearBtn");
const invCloseBtn  = document.getElementById("invCloseBtn");
const invCountLabel= document.getElementById("invCountLabel");

const prefersReducedMotion =
  window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

let stream = null;
let count = 0;
let busy = false;

// 채집물 저장소(메모리): { dataURL, w, h }  (w,h = 컷아웃 bbox 원본 픽셀 크기)
const store = [];

// ---- 오버레이 헬퍼 ----
function showOverlay(title, msg, btnLabel, onClick) {
  ovTitle.textContent = title;
  ovMsg.innerHTML = msg;
  if (btnLabel) {
    ovBtn.style.display = "inline-block";
    ovBtn.textContent = btnLabel;
    ovBtn.onclick = onClick || (() => location.reload());
  } else {
    ovBtn.style.display = "none";
  }
  overlay.classList.add("show");
}
function hideOverlay() { overlay.classList.remove("show"); }

// ---- 카메라 시작 ----
async function startCamera() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showOverlay("카메라를 쓸 수 없어요",
      "이 브라우저는 카메라 접근(getUserMedia)을 지원하지 않아요.<br>최신 Chrome/Safari에서 열어 주세요.",
      "새로고침");
    return;
  }
  // 보안 컨텍스트 체크 (https 또는 localhost)
  if (!window.isSecureContext) {
    showOverlay("https가 필요해요",
      "카메라는 보안 연결(https)에서만 작동해요.<br>GitHub Pages 주소(https://…) 또는 localhost로 열어 주세요.",
      "새로고침");
    return;
  }

  showOverlay("카메라를 준비 중…", "권한 요청을 허용해 주세요.", null);

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      audio: false,
      video: {
        facingMode: { ideal: "environment" },
        width:  { ideal: 1920 },
        height: { ideal: 1080 }
      }
    });
    video.srcObject = stream;
    await video.play().catch(() => {}); // 일부 브라우저는 사용자 제스처 필요 → 무시

    await new Promise((res) => {
      if (video.readyState >= 2 && video.videoWidth) return res();
      video.onloadedmetadata = () => res();
    });

    hideOverlay();
  } catch (err) {
    handleCameraError(err);
  }
}

function handleCameraError(err) {
  const name = err && err.name ? err.name : "";
  if (name === "NotAllowedError" || name === "SecurityError" || name === "PermissionDeniedError") {
    showOverlay("카메라 권한이 거부됐어요",
      "브라우저 주소창의 자물쇠 아이콘 → 카메라 권한을 '허용'으로 바꾼 뒤 다시 시도해 주세요.",
      "다시 시도", startCamera);
  } else if (name === "NotFoundError" || name === "DevicesNotFoundError" || name === "OverconstrainedError") {
    showOverlay("카메라를 찾지 못했어요",
      "후면 카메라를 찾지 못했어요. 기기에 카메라가 있는지 확인해 주세요.",
      "다시 시도", startCamera);
  } else {
    showOverlay("카메라를 열 수 없어요",
      "알 수 없는 오류가 발생했어요." + (name ? "<br>(" + name + ")" : ""),
      "다시 시도", startCamera);
  }
}

/* =========================================================
   리티클 → 비디오 소스 크롭 사각형 계산
   object-fit: cover 를 고려해 화면 좌표를 비디오 원본 픽셀로 역변환.
   ========================================================= */
function getSourceCropRect() {
  const vw = video.videoWidth;
  const vh = video.videoHeight;
  if (!vw || !vh) return null;

  const stageRect = stage.getBoundingClientRect();
  const dispW = stageRect.width;
  const dispH = stageRect.height;

  // cover: 비디오를 꽉 채우도록 스케일 → 더 큰 비율 사용
  const scale = Math.max(dispW / vw, dispH / vh);
  const drawnW = vw * scale;       // 화면상 비디오 실제 그려진 크기
  const drawnH = vh * scale;
  const offsetX = (dispW - drawnW) / 2; // cover라 보통 음수 (잘려나간 부분)
  const offsetY = (dispH - drawnH) / 2;

  // 리티클의 화면 좌표 (stage 기준)
  const r = reticleEl.getBoundingClientRect();
  const rx = r.left - stageRect.left;
  const ry = r.top  - stageRect.top;

  // 화면 좌표 → 비디오 원본 픽셀 좌표
  let sx = (rx - offsetX) / scale;
  let sy = (ry - offsetY) / scale;
  let sWidth  = r.width  / scale;
  let sHeight = r.height / scale;

  // 경계 클램프
  sx = Math.max(0, Math.min(sx, vw - 1));
  sy = Math.max(0, Math.min(sy, vh - 1));
  sWidth  = Math.max(1, Math.min(sWidth,  vw - sx));
  sHeight = Math.max(1, Math.min(sHeight, vh - sy));

  return { sx, sy, sWidth, sHeight, screen: r, stageRect };
}

/* =========================================================
   색공간: sRGB → 선형 → XYZ → LAB
   ========================================================= */
function srgbToLinear(c) {
  c /= 255;
  return c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
}
function labF(t) {
  // CIE f()
  return t > 0.008856451679035631 ? Math.cbrt(t) : (7.787037037037035 * t + 16 / 116);
}
// D65 white
const LAB_XN = 0.95047, LAB_YN = 1.0, LAB_ZN = 1.08883;
function rgbToLab(r, g, b) {
  const rl = srgbToLinear(r), gl = srgbToLinear(g), bl = srgbToLinear(b);
  // linear sRGB → XYZ (D65)
  const X = rl * 0.4124564 + gl * 0.3575761 + bl * 0.1804375;
  const Y = rl * 0.2126729 + gl * 0.7151522 + bl * 0.0721750;
  const Z = rl * 0.0193339 + gl * 0.1191920 + bl * 0.9503041;
  const fx = labF(X / LAB_XN);
  const fy = labF(Y / LAB_YN);
  const fz = labF(Z / LAB_ZN);
  const L = 116 * fy - 16;
  const A = 500 * (fx - fy);
  const B = 200 * (fy - fz);
  return [L, A, B];
}

/* =========================================================
   배경 제거 파이프라인 (재귀 없음 — 모두 명시적 스택/큐)
     1) 다중 에지 샘플로 배경 색 모델(LAB) 구성
     2) 에지에서 안쪽으로 LAB 거리 플러드필 → 배경 마스크
     3) 후처리: 구멍 메움 → 작은 전경 speck 제거 → 알파 페더
     4) 전경 bbox 크롭 → 투명 PNG
   반환: { dataURL, width, height, cxRatio, cyRatio } 또는 null
   ========================================================= */
function removeBackground(srcCanvas) {
  const w = srcCanvas.width;
  const h = srcCanvas.height;
  const ctx = srcCanvas.getContext("2d", { willReadFrequently: true });
  const imgData = ctx.getImageData(0, 0, w, h);
  const data = imgData.data;
  const N = w * h;

  // --- LAB 룩업: 픽셀별 LAB 미리 계산(성능) ---
  const labL = new Float32Array(N);
  const labA = new Float32Array(N);
  const labB = new Float32Array(N);
  for (let p = 0; p < N; p++) {
    const i = p * 4;
    const lab = rgbToLab(data[i], data[i + 1], data[i + 2]);
    labL[p] = lab[0]; labA[p] = lab[1]; labB[p] = lab[2];
  }

  // --- 1) 다중 에지 샘플 → 배경 색 모델 ---
  const seedPts = [];
  const samp = Math.max(2, EDGE_SAMPLES);
  for (let s = 0; s < samp; s++) {
    const fx = Math.round((w - 1) * (s / (samp - 1)));
    const fy = Math.round((h - 1) * (s / (samp - 1)));
    seedPts.push(fy * w + 0);          // 왼쪽 변
    seedPts.push(fy * w + (w - 1));    // 오른쪽 변
    seedPts.push(0 * w + fx);          // 위쪽 변
    seedPts.push((h - 1) * w + fx);    // 아래쪽 변
  }
  // 배경 LAB 모델(중복 제거는 비용 대비 의미 적어 그대로 둠)
  const bgL = [], bgA = [], bgB = [];
  for (const sp0 of seedPts) {
    bgL.push(labL[sp0]); bgA.push(labA[sp0]); bgB.push(labB[sp0]);
  }
  const M = bgL.length;
  const tol2 = TOLERANCE * TOLERANCE; // LAB ΔE^2 임계

  function isBgColor(p) {
    const Lp = labL[p], Ap = labA[p], Bp = labB[p];
    for (let k = 0; k < M; k++) {
      const dL = Lp - bgL[k];
      const dA = Ap - bgA[k];
      const dB = Bp - bgB[k];
      if (dL * dL + dA * dA + dB * dB <= tol2) return true;
    }
    return false;
  }

  // --- 2) 에지에서 안쪽으로 플러드필 (명시적 스택) ---
  const bg = new Uint8Array(N); // 1 = 배경
  const stack = new Int32Array(N);
  let sp = 0;
  // 시드: 모든 에지 픽셀 중 배경색인 것
  function trySeed(p) {
    if (!bg[p] && isBgColor(p)) { bg[p] = 1; stack[sp++] = p; }
  }
  for (let x = 0; x < w; x++) { trySeed(x); trySeed((h - 1) * w + x); }
  for (let y = 0; y < h; y++) { trySeed(y * w); trySeed(y * w + (w - 1)); }

  while (sp > 0) {
    const p = stack[--sp];
    const x = p % w;
    const y = (p - x) / w;
    if (x > 0)     { const q = p - 1; if (!bg[q] && isBgColor(q)) { bg[q] = 1; stack[sp++] = q; } }
    if (x < w - 1) { const q = p + 1; if (!bg[q] && isBgColor(q)) { bg[q] = 1; stack[sp++] = q; } }
    if (y > 0)     { const q = p - w; if (!bg[q] && isBgColor(q)) { bg[q] = 1; stack[sp++] = q; } }
    if (y < h - 1) { const q = p + w; if (!bg[q] && isBgColor(q)) { bg[q] = 1; stack[sp++] = q; } }
  }

  // --- 3a) 구멍 메움: 에지에 연결된 배경만 "진짜 배경".
  //         배경으로 분류됐지만 에지에서 도달 불가한 영역 = 내부 구멍 → 전경 복원.
  //   reachable[p]=1 : 외부 배경에서 4방향으로 도달 가능한 배경.
  const reachable = new Uint8Array(N);
  let qp = 0;
  const queue = stack; // 재사용
  for (let x = 0; x < w; x++) {
    let p = x;                 if (bg[p] && !reachable[p]) { reachable[p] = 1; queue[qp++] = p; }
    p = (h - 1) * w + x;       if (bg[p] && !reachable[p]) { reachable[p] = 1; queue[qp++] = p; }
  }
  for (let y = 0; y < h; y++) {
    let p = y * w;             if (bg[p] && !reachable[p]) { reachable[p] = 1; queue[qp++] = p; }
    p = y * w + (w - 1);       if (bg[p] && !reachable[p]) { reachable[p] = 1; queue[qp++] = p; }
  }
  while (qp > 0) {
    const p = queue[--qp];
    const x = p % w;
    const y = (p - x) / w;
    if (x > 0)     { const q = p - 1; if (bg[q] && !reachable[q]) { reachable[q] = 1; queue[qp++] = q; } }
    if (x < w - 1) { const q = p + 1; if (bg[q] && !reachable[q]) { reachable[q] = 1; queue[qp++] = q; } }
    if (y > 0)     { const q = p - w; if (bg[q] && !reachable[q]) { reachable[q] = 1; queue[qp++] = q; } }
    if (y < h - 1) { const q = p + w; if (bg[q] && !reachable[q]) { reachable[q] = 1; queue[qp++] = q; } }
  }
  // 도달 불가한 배경(=구멍)은 전경으로 되돌림
  for (let p = 0; p < N; p++) {
    if (bg[p] && !reachable[p]) bg[p] = 0;
  }

  // --- 3b) 작은 전경 speck 제거: 전경 연결성분 라벨링(명시적 큐), 크기<MIN_BLOB_PX면 배경화 ---
  const seen = new Uint8Array(N);
  const comp = new Int32Array(N);
  for (let start = 0; start < N; start++) {
    if (bg[start] || seen[start]) continue;
    // BFS
    let cp = 0;
    comp[cp++] = start;
    seen[start] = 1;
    let head = 0;
    while (head < cp) {
      const p = comp[head++];
      const x = p % w;
      const y = (p - x) / w;
      if (x > 0)     { const q = p - 1; if (!bg[q] && !seen[q]) { seen[q] = 1; comp[cp++] = q; } }
      if (x < w - 1) { const q = p + 1; if (!bg[q] && !seen[q]) { seen[q] = 1; comp[cp++] = q; } }
      if (y > 0)     { const q = p - w; if (!bg[q] && !seen[q]) { seen[q] = 1; comp[cp++] = q; } }
      if (y < h - 1) { const q = p + w; if (!bg[q] && !seen[q]) { seen[q] = 1; comp[cp++] = q; } }
    }
    if (cp < MIN_BLOB_PX) {
      for (let k = 0; k < cp; k++) bg[comp[k]] = 1; // speck → 배경
    }
  }

  // --- 알파 1차 설정: 배경=0, 전경=255 ---
  for (let p = 0; p < N; p++) {
    data[p * 4 + 3] = bg[p] ? 0 : 255;
  }

  // --- bbox 계산 + 전경 픽셀 수 ---
  let minX = w, minY = h, maxX = -1, maxY = -1, kept = 0;
  for (let p = 0; p < N; p++) {
    if (!bg[p]) {
      kept++;
      const x = p % w;
      const y = (p - x) / w;
      if (x < minX) minX = x;
      if (x > maxX) maxX = x;
      if (y < minY) minY = y;
      if (y > maxY) maxY = y;
    }
  }
  // 검출 실패 가드
  if (maxX < 0 || kept < N * MIN_OBJECT_RATIO) {
    return null;
  }

  // --- 3c) 페더: 마스크 경계의 알파를 박스블러로 부드럽게 ---
  if (FEATHER_PX > 0) {
    featherAlpha(data, w, h, FEATHER_PX);
  }

  ctx.putImageData(imgData, 0, 0);

  // --- 4) bbox 크롭 → 투명 PNG ---
  const cw = maxX - minX + 1;
  const ch = maxY - minY + 1;
  const out = document.createElement("canvas");
  out.width = cw;
  out.height = ch;
  const octx = out.getContext("2d");
  octx.drawImage(srcCanvas, minX, minY, cw, ch, 0, 0, cw, ch);

  return {
    dataURL: out.toDataURL("image/png"),
    width: cw,
    height: ch,
    cxRatio: (minX + cw / 2) / w,
    cyRatio: (minY + ch / 2) / h
  };
}

/* 알파 채널만 박스블러(분리형). 경계가 0↔255 사이에서 부드러워짐. */
function featherAlpha(data, w, h, radius) {
  const N = w * h;
  const a = new Float32Array(N);
  for (let p = 0; p < N; p++) a[p] = data[p * 4 + 3];
  const tmp = new Float32Array(N);
  const win = radius * 2 + 1;

  // 가로 패스
  for (let y = 0; y < h; y++) {
    const row = y * w;
    let sum = 0;
    for (let k = -radius; k <= radius; k++) {
      const xx = Math.min(w - 1, Math.max(0, k));
      sum += a[row + xx];
    }
    for (let x = 0; x < w; x++) {
      tmp[row + x] = sum / win;
      const xOut = x - radius;
      const xIn = x + radius + 1;
      sum -= a[row + Math.min(w - 1, Math.max(0, xOut))];
      sum += a[row + Math.min(w - 1, Math.max(0, xIn))];
    }
  }
  // 세로 패스
  for (let x = 0; x < w; x++) {
    let sum = 0;
    for (let k = -radius; k <= radius; k++) {
      const yy = Math.min(h - 1, Math.max(0, k));
      sum += tmp[yy * w + x];
    }
    for (let y = 0; y < h; y++) {
      a[y * w + x] = sum / win;
      const yOut = y - radius;
      const yIn = y + radius + 1;
      sum -= tmp[Math.min(h - 1, Math.max(0, yOut)) * w + x];
      sum += tmp[Math.min(h - 1, Math.max(0, yIn)) * w + x];
    }
  }
  for (let p = 0; p < N; p++) {
    let v = a[p];
    if (v < 0) v = 0; else if (v > 255) v = 255;
    data[p * 4 + 3] = v | 0;
  }
}

/* =========================================================
   채집 동작 — 메인 화면은 카메라만. 컷아웃은 store로 저장 + 배지/플래시만.
   ========================================================= */
async function capture() {
  if (busy) return;
  if (!stream || !video.videoWidth) return;
  busy = true;
  captureBtn.disabled = true;

  // 플래시
  flashEl.classList.remove("fire");
  void flashEl.offsetWidth; // 강제 리플로우로 애니메이션 재시작
  flashEl.classList.add("fire");

  try {
    const crop = getSourceCropRect();
    if (!crop) { busy = false; captureBtn.disabled = false; return; }

    // 처리 캔버스 크기: 긴 변 MAX_DIM
    const srcAspect = crop.sWidth / crop.sHeight;
    let pw, ph;
    if (crop.sWidth >= crop.sHeight) {
      pw = Math.min(MAX_DIM, Math.round(crop.sWidth));
      ph = Math.round(pw / srcAspect);
    } else {
      ph = Math.min(MAX_DIM, Math.round(crop.sHeight));
      pw = Math.round(ph * srcAspect);
    }
    pw = Math.max(1, pw);
    ph = Math.max(1, ph);

    const proc = document.createElement("canvas");
    proc.width = pw;
    proc.height = ph;
    const pctx = proc.getContext("2d", { willReadFrequently: true });
    pctx.drawImage(
      video,
      crop.sx, crop.sy, crop.sWidth, crop.sHeight,
      0, 0, pw, ph
    );

    const result = removeBackground(proc);

    if (!result) {
      bumpCounter(true); // 검출 실패: 카운터 흔들기
      busy = false;
      captureBtn.disabled = false;
      return;
    }

    // store에 저장 (bbox 원본 크기)
    store.push({ dataURL: result.dataURL, w: result.width, h: result.height });

    count++;
    countEl.textContent = count;
    updateInvBadge(true);
    bumpCounter(false);
  } catch (e) {
    console.error(e);
  } finally {
    busy = false;
    captureBtn.disabled = false;
  }
}

function bumpCounter(isFail) {
  const el = document.getElementById("counter");
  el.style.transition = "transform 120ms ease";
  el.style.transform = isFail ? "translateX(-4px)" : "scale(1.12)";
  setTimeout(() => { el.style.transform = "none"; }, 130);
}

function updateInvBadge(animate) {
  invBadge.textContent = String(store.length);
  if (animate && !prefersReducedMotion) {
    invBadge.classList.remove("bump");
    void invBadge.offsetWidth;
    invBadge.classList.add("bump");
  }
}

/* =========================================================
   채집물 오버레이 — Matter.js 중력 물리(겹침 없는 적층)
   폴백: prefers-reduced-motion 또는 Matter 미정의 → 정적 그리드
   ========================================================= */
const Phys = {
  engine: null,
  runner: null,
  render: null,
  orientHandler: null,
  open: false
};

function physicsAvailable() {
  return typeof window.Matter !== "undefined" && !prefersReducedMotion;
}

function openInventory() {
  if (Phys.open) return;
  Phys.open = true;
  inventoryEl.classList.add("show");
  invCountLabel.textContent = store.length + "개";

  const empty = store.length === 0;
  invEmpty.classList.toggle("show", empty);

  if (empty) {
    invGrid.classList.remove("show");
    invCanvas.style.display = "none";
    return;
  }

  if (physicsAvailable()) {
    invCanvas.style.display = "block";
    invGrid.classList.remove("show");
    // 레이아웃 확정 후 빌드
    requestAnimationFrame(() => buildPhysics());
  } else {
    invCanvas.style.display = "none";
    buildGrid();
  }
}

function closeInventory() {
  if (!Phys.open) return;
  Phys.open = false;
  inventoryEl.classList.remove("show");
  teardownPhysics();
  invGrid.classList.remove("show");
  invGrid.innerHTML = "";
}

/* 폴백 정적 그리드 */
function buildGrid() {
  invGrid.innerHTML = "";
  for (const it of store) {
    const cell = document.createElement("div");
    cell.className = "gridItem";
    const img = document.createElement("img");
    img.src = it.dataURL;
    cell.appendChild(img);
    invGrid.appendChild(cell);
  }
  invGrid.classList.add("show");
}

/* Matter.js 물리 파일 빌드 */
function buildPhysics() {
  if (!Phys.open) return;
  const M = window.Matter;
  const { Engine, Render, Runner, Bodies, Composite, Body } = M;

  const vw = invViewport.clientWidth;
  const vh = invViewport.clientHeight;
  if (vw < 2 || vh < 2) return;

  const dpr = window.devicePixelRatio || 1;

  const engine = Engine.create();
  engine.gravity.y = 1;
  engine.gravity.x = 0;

  const render = Render.create({
    canvas: invCanvas,
    engine: engine,
    options: {
      width: vw,
      height: vh,
      pixelRatio: dpr,
      wireframes: false,
      background: "transparent"
    }
  });

  // 정적 경계: 바닥 + 좌/우 벽 + 천장
  const wallOpts = { isStatic: true, restitution: 0.2, friction: 0.6, render: { visible: false } };
  const floor = Bodies.rectangle(vw / 2, vh + WALL_THICK / 2, vw + WALL_THICK * 2, WALL_THICK, wallOpts);
  const left  = Bodies.rectangle(-WALL_THICK / 2, vh / 2, WALL_THICK, vh * 2, wallOpts);
  const right = Bodies.rectangle(vw + WALL_THICK / 2, vh / 2, WALL_THICK, vh * 2, wallOpts);
  const ceil  = Bodies.rectangle(vw / 2, -vh - WALL_THICK / 2, vw + WALL_THICK * 2, WALL_THICK, wallOpts);
  Composite.add(engine.world, [floor, left, right, ceil]);

  Phys.engine = engine;
  Phys.render = render;
  Render.run(render);
  const runner = Runner.create();
  Runner.run(runner, engine);
  Phys.runner = runner;

  // 컷아웃을 하나씩 staggered 드롭
  const drops = store.slice();
  let i = 0;
  function dropNext() {
    if (!Phys.open || Phys.engine !== engine) return; // 닫혔거나 재빌드됨
    if (i >= drops.length) return;
    const it = drops[i++];

    // 화면 표시 크기(최대/최소 캡) — 텍스처 스케일 계산
    const natMax = Math.max(it.w, it.h) || 1;
    let scale = PHYS_MAX_DIM / natMax;
    const minNat = Math.min(it.w, it.h) || 1;
    if (minNat * scale < PHYS_MIN_DIM) scale = PHYS_MIN_DIM / minNat;
    const bw = Math.max(8, it.w * scale);
    const bh = Math.max(8, it.h * scale);

    // 스프라이트 텍스처 스케일: 바디 bbox에 PNG가 딱 맞도록
    const xScale = bw / it.w;
    const yScale = bh / it.h;

    const x = bw / 2 + Math.random() * Math.max(1, (vw - bw));
    const y = -bh - Math.random() * 40;

    const body = Bodies.rectangle(x, y, bw, bh, {
      restitution: 0.2,
      friction: 0.6,
      frictionAir: 0.01,
      render: {
        sprite: { texture: it.dataURL, xScale: xScale, yScale: yScale }
      }
    });
    Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.1);
    Composite.add(engine.world, body);

    if (i < drops.length) {
      setTimeout(dropNext, DROP_STAGGER_MS);
    }
  }
  dropNext();

  // OPTIONAL: deviceorientation → 중력 방향 기울이기 (미지원/권한없음 시 조용히 스킵)
  try {
    if (typeof window.DeviceOrientationEvent !== "undefined" &&
        typeof window.DeviceOrientationEvent.requestPermission !== "function") {
      // iOS 권한 프롬프트가 필요한 경우는 자동 요청하지 않고 스킵(제스처 정책)
      const handler = (e) => {
        if (!Phys.engine || Phys.engine !== engine) return;
        const g = e.gamma; // 좌우 기울기 (-90..90)
        const b = e.beta;  // 앞뒤 기울기 (-180..180)
        if (g == null || b == null) return;
        engine.gravity.x = Math.max(-1, Math.min(1, g / 45));
        engine.gravity.y = Math.max(-1, Math.min(1, Math.max(0.2, b / 45)));
      };
      window.addEventListener("deviceorientation", handler);
      Phys.orientHandler = handler;
    }
  } catch (_) { /* 조용히 무시 */ }
}

/* 물리 정리 — 누수/중복 러너 방지 */
function teardownPhysics() {
  const M = window.Matter;
  if (Phys.orientHandler) {
    window.removeEventListener("deviceorientation", Phys.orientHandler);
    Phys.orientHandler = null;
  }
  if (M) {
    if (Phys.render) {
      M.Render.stop(Phys.render);
      if (Phys.render.context && Phys.render.canvas) {
        // 캔버스 비우기(텍스처 메모리 해제 유도)
        const c = Phys.render.canvas;
        const cx = c.getContext("2d");
        if (cx) cx.clearRect(0, 0, c.width, c.height);
      }
      Phys.render.textures = {};
    }
    if (Phys.runner) M.Runner.stop(Phys.runner);
    if (Phys.engine) {
      M.Composite.clear(Phys.engine.world, false);
      M.Engine.clear(Phys.engine);
    }
  }
  Phys.render = null;
  Phys.runner = null;
  Phys.engine = null;
}

/* 비우기 */
function clearStore() {
  store.length = 0;
  count = 0;
  countEl.textContent = "0";
  updateInvBadge(false);
  invCountLabel.textContent = "0개";
  // 열려있으면 즉시 반영
  if (Phys.open) {
    teardownPhysics();
    invGrid.classList.remove("show");
    invGrid.innerHTML = "";
    invCanvas.style.display = "none";
    invEmpty.classList.add("show");
  }
}

// ---- 이벤트 ----
captureBtn.addEventListener("click", capture);
invBtn.addEventListener("click", openInventory);
invCloseBtn.addEventListener("click", closeInventory);
invClearBtn.addEventListener("click", clearStore);

// 화면 탭(컨트롤 외 영역)으로도 채집 가능하게 — 편의
stage.addEventListener("click", (e) => {
  if (e.target === video || e.target === stage) capture();
});

// 탭 복귀 시 카메라가 멈춰있으면 재개
document.addEventListener("visibilitychange", () => {
  if (!document.hidden && video.paused && stream) {
    video.play().catch(() => {});
  }
});

// 시작
updateInvBadge(false);
startCamera();
</script>
</body>
