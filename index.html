<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0e0f13" />
<title>채집 카메라</title>
<style>
  :root {
    --bg: #0e0f13;
    --panel: #16181f;
    --panel-2: #1d2029;
    --line: #2a2e3a;
    --accent: #7CFFB2;
    --accent-2: #28c97a;
    --text: #e8ebf2;
    --muted: #9aa1b1;
    --danger: #ff6b6b;
    --tray-h: 168px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
  }

  #app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
  }

  /* ===== Camera stage ===== */
  #stage {
    position: relative;
    flex: 1 1 auto;
    min-height: 0;
    overflow: hidden;
    background: #000;
  }

  #video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* dimmed mask outside the reticle */
  #mask {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: rgba(0,0,0,0.35);
    -webkit-mask:
      linear-gradient(#000 0 0) content-box,
      linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
  }

  /* Reticle frame (centered square-ish) */
  #reticle {
    position: absolute;
    left: 50%;
    top: 46%;
    transform: translate(-50%, -50%);
    width: min(72vw, 320px);
    height: min(72vw, 320px);
    border-radius: 18px;
    pointer-events: none;
    box-shadow: 0 0 0 100vmax rgba(0,0,0,0.34);
  }
  #reticle::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 18px;
    border: 2px solid rgba(124,255,178,0.0);
  }
  /* corner brackets */
  .corner {
    position: absolute;
    width: 28px;
    height: 28px;
    border: 3px solid var(--accent);
    border-radius: 4px;
  }
  .corner.tl { top: -2px; left: -2px; border-right: none; border-bottom: none; border-top-left-radius: 14px; }
  .corner.tr { top: -2px; right: -2px; border-left: none; border-bottom: none; border-top-right-radius: 14px; }
  .corner.bl { bottom: -2px; left: -2px; border-right: none; border-top: none; border-bottom-left-radius: 14px; }
  .corner.br { bottom: -2px; right: -2px; border-left: none; border-top: none; border-bottom-right-radius: 14px; }

  #reticle .hint {
    position: absolute;
    left: 50%;
    bottom: -34px;
    transform: translateX(-50%);
    white-space: nowrap;
    font-size: 13px;
    color: var(--muted);
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }

  /* Counter badge */
  #counter {
    position: absolute;
    top: calc(env(safe-area-inset-top, 0px) + 14px);
    left: 14px;
    z-index: 5;
    background: rgba(20,22,28,0.72);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  #counter b { color: var(--accent); }

  /* Flash overlay */
  #flash {
    position: absolute;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 9;
  }
  #flash.fire {
    animation: flash 360ms ease-out;
  }
  @keyframes flash {
    0% { opacity: 0; }
    8% { opacity: 0.85; }
    100% { opacity: 0; }
  }

  /* falling cutout sprites live here */
  #fxLayer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 8;
    overflow: hidden;
  }
  .sprite {
    position: absolute;
    will-change: transform, opacity;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,0.5));
  }
  .sprite img { display: block; width: 100%; height: 100%; }

  /* ===== Controls ===== */
  #controls {
    position: relative;
    z-index: 6;
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 14px 22px;
    background: linear-gradient(180deg, rgba(14,15,19,0.0), rgba(14,15,19,0.9) 40%, var(--bg));
  }

  #clearBtn {
    flex: 0 0 auto;
    width: 64px; height: 64px;
    border-radius: 16px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #clearBtn:active { background: #262a35; }

  /* Capture button */
  #captureBtn {
    flex: 0 0 auto;
    width: 84px; height: 84px;
    border-radius: 50%;
    border: none;
    background: radial-gradient(circle at 50% 38%, var(--accent), var(--accent-2));
    color: #06210f;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 0 0 6px rgba(124,255,178,0.14), 0 8px 18px rgba(0,0,0,0.5);
    transition: transform 90ms ease;
  }
  #captureBtn:active { transform: scale(0.92); }
  #captureBtn:disabled { opacity: 0.5; cursor: default; }

  #spacer { width: 64px; height: 64px; flex: 0 0 auto; }

  /* ===== Tray ===== */
  #tray {
    flex: 0 0 auto;
    height: var(--tray-h);
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.012) 0 12px, rgba(255,255,255,0) 12px 24px),
      var(--panel);
    border-top: 1px solid var(--line);
    overflow-y: auto;
    overflow-x: hidden;
    padding: 12px 12px calc(12px + env(safe-area-inset-bottom, 0px));
    display: flex;
    flex-wrap: wrap;
    align-content: flex-start;
    gap: 8px;
    -webkit-overflow-scrolling: touch;
  }
  #tray:empty::before {
    content: "여기에 채집한 것들이 쌓여요";
    color: var(--muted);
    font-size: 13px;
    margin: auto;
  }
  .item {
    width: 72px;
    height: 72px;
    border-radius: 12px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex: 0 0 auto;
  }
  .item img {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
  }
  .item.pop { animation: pop 360ms cubic-bezier(.18,1.5,.5,1); }
  @keyframes pop {
    0% { transform: scale(0.2); opacity: 0; }
    60% { transform: scale(1.12); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ===== Overlay (errors / guidance) ===== */
  #overlay {
    position: fixed;
    inset: 0;
    z-index: 50;
    background: rgba(8,9,12,0.92);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 28px;
    text-align: center;
  }
  #overlay.show { display: flex; }
  #overlay .card {
    max-width: 360px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 28px 24px;
  }
  #overlay h2 { margin: 0 0 12px; font-size: 19px; }
  #overlay p { margin: 0 0 18px; color: var(--muted); font-size: 14px; line-height: 1.6; }
  #overlay button {
    background: var(--accent);
    color: #06210f;
    border: none;
    border-radius: 12px;
    padding: 12px 22px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  #overlay .emoji { font-size: 40px; margin-bottom: 10px; }

  @media (prefers-reduced-motion: reduce) {
    #flash.fire { animation-duration: 120ms; }
    .item.pop { animation: none; }
    .sprite { transition: none !important; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <video id="video" playsinline webkit-playsinline muted autoplay></video>
    <div id="reticle">
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>
      <span class="hint">대상을 가운데 맞추고 채집</span>
    </div>
    <div id="counter">채집 <b id="count">0</b></div>
    <div id="fxLayer"></div>
    <div id="flash"></div>
  </div>

  <div id="controls">
    <button id="clearBtn" title="비우기">비우기</button>
    <button id="captureBtn">채집</button>
    <div id="spacer"></div>
  </div>

  <div id="tray"></div>
</div>

<div id="overlay">
  <div class="card">
    <div class="emoji">📷</div>
    <h2 id="ovTitle">카메라를 준비 중…</h2>
    <p id="ovMsg">잠시만 기다려 주세요.</p>
    <button id="ovBtn" style="display:none">다시 시도</button>
  </div>
</div>

<script>
"use strict";

/* =========================================================
   채집 카메라 — 단일 파일 바닐라 웹앱
   배경 제거: 모서리 시드 기반 플러드필 (ML 없음, 오프라인 즉시)
   ========================================================= */

// ---- 튜닝 상수 ----
const MAX_DIM = 640;        // 처리 캔버스 긴 변 길이(px). 성능/품질 균형.
const TOLERANCE = 36;       // 배경 유사도 임계값(0~255, 채널별 유클리드 거리). 클수록 더 많이 지움.
const EDGE_FEATHER = true;  // 가장자리 살짝 부드럽게
const MIN_OBJECT_RATIO = 0.004; // 남은 객체가 이 비율보다 작으면 "검출 실패"로 간주

// ---- DOM ----
const video      = document.getElementById("video");
const stage      = document.getElementById("stage");
const reticleEl  = document.getElementById("reticle");
const captureBtn = document.getElementById("captureBtn");
const clearBtn   = document.getElementById("clearBtn");
const tray        = document.getElementById("tray");
const countEl    = document.getElementById("count");
const flashEl    = document.getElementById("flash");
const fxLayer    = document.getElementById("fxLayer");
const overlay    = document.getElementById("overlay");
const ovTitle    = document.getElementById("ovTitle");
const ovMsg      = document.getElementById("ovMsg");
const ovBtn      = document.getElementById("ovBtn");

const prefersReducedMotion =
  window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

let stream = null;
let count = 0;
let busy = false;

// ---- 오버레이 헬퍼 ----
function showOverlay(title, msg, btnLabel, onClick) {
  ovTitle.textContent = title;
  ovMsg.innerHTML = msg;
  if (btnLabel) {
    ovBtn.style.display = "inline-block";
    ovBtn.textContent = btnLabel;
    ovBtn.onclick = onClick || (() => location.reload());
  } else {
    ovBtn.style.display = "none";
  }
  overlay.classList.add("show");
}
function hideOverlay() { overlay.classList.remove("show"); }

// ---- 카메라 시작 ----
async function startCamera() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showOverlay("카메라를 쓸 수 없어요",
      "이 브라우저는 카메라 접근(getUserMedia)을 지원하지 않아요.<br>최신 Chrome/Safari에서 열어 주세요.",
      "새로고침");
    return;
  }
  // 보안 컨텍스트 체크 (https 또는 localhost)
  if (!window.isSecureContext) {
    showOverlay("https가 필요해요",
      "카메라는 보안 연결(https)에서만 작동해요.<br>GitHub Pages 주소(https://…) 또는 localhost로 열어 주세요.",
      "새로고침");
    return;
  }

  showOverlay("카메라를 준비 중…", "권한 요청을 허용해 주세요.", null);

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      audio: false,
      video: {
        facingMode: { ideal: "environment" },
        width:  { ideal: 1920 },
        height: { ideal: 1080 }
      }
    });
    video.srcObject = stream;
    await video.play().catch(() => {}); // 일부 브라우저는 사용자 제스처 필요 → 무시

    await new Promise((res) => {
      if (video.readyState >= 2 && video.videoWidth) return res();
      video.onloadedmetadata = () => res();
    });

    hideOverlay();
  } catch (err) {
    handleCameraError(err);
  }
}

function handleCameraError(err) {
  const name = err && err.name ? err.name : "";
  if (name === "NotAllowedError" || name === "SecurityError" || name === "PermissionDeniedError") {
    showOverlay("카메라 권한이 거부됐어요",
      "브라우저 주소창의 자물쇠 아이콘 → 카메라 권한을 '허용'으로 바꾼 뒤 다시 시도해 주세요.",
      "다시 시도", startCamera);
  } else if (name === "NotFoundError" || name === "DevicesNotFoundError" || name === "OverconstrainedError") {
    showOverlay("카메라를 찾지 못했어요",
      "후면 카메라를 찾지 못했어요. 기기에 카메라가 있는지 확인해 주세요.",
      "다시 시도", startCamera);
  } else {
    showOverlay("카메라를 열 수 없어요",
      "알 수 없는 오류가 발생했어요." + (name ? "<br>(" + name + ")" : ""),
      "다시 시도", startCamera);
  }
}

/* =========================================================
   리티클 → 비디오 소스 크롭 사각형 계산
   object-fit: cover 를 고려해 화면 좌표를 비디오 원본 픽셀로 역변환.
   ========================================================= */
function getSourceCropRect() {
  const vw = video.videoWidth;
  const vh = video.videoHeight;
  if (!vw || !vh) return null;

  const stageRect = stage.getBoundingClientRect();
  const dispW = stageRect.width;
  const dispH = stageRect.height;

  // cover: 비디오를 꽉 채우도록 스케일 → 더 큰 비율 사용
  const scale = Math.max(dispW / vw, dispH / vh);
  const drawnW = vw * scale;       // 화면상 비디오 실제 그려진 크기
  const drawnH = vh * scale;
  const offsetX = (dispW - drawnW) / 2; // cover라 보통 음수 (잘려나간 부분)
  const offsetY = (dispH - drawnH) / 2;

  // 리티클의 화면 좌표 (stage 기준)
  const r = reticleEl.getBoundingClientRect();
  const rx = r.left - stageRect.left;
  const ry = r.top  - stageRect.top;

  // 화면 좌표 → 비디오 원본 픽셀 좌표
  let sx = (rx - offsetX) / scale;
  let sy = (ry - offsetY) / scale;
  let sWidth  = r.width  / scale;
  let sHeight = r.height / scale;

  // 경계 클램프
  sx = Math.max(0, Math.min(sx, vw - 1));
  sy = Math.max(0, Math.min(sy, vh - 1));
  sWidth  = Math.max(1, Math.min(sWidth,  vw - sx));
  sHeight = Math.max(1, Math.min(sHeight, vh - sy));

  return { sx, sy, sWidth, sHeight, screen: r, stageRect };
}

/* =========================================================
   배경 제거: 모서리 시드 플러드필 (명시적 스택, 재귀 없음)
   반환: { dataURL, width, height } 또는 null(검출 실패)
   ========================================================= */
function removeBackground(srcCanvas) {
  const w = srcCanvas.width;
  const h = srcCanvas.height;
  const ctx = srcCanvas.getContext("2d", { willReadFrequently: true });
  const imgData = ctx.getImageData(0, 0, w, h);
  const data = imgData.data;
  const N = w * h;

  // visited / background 마킹
  const bg = new Uint8Array(N); // 1 = 배경(투명 처리 대상)

  // 네 모서리 색을 시드로
  const cornerIdx = [
    0,
    (w - 1),
    (h - 1) * w,
    (h - 1) * w + (w - 1)
  ];

  const tol2 = TOLERANCE * TOLERANCE;

  // 시드 색상 평균(코너 4개)
  function colorAt(p) {
    const i = p * 4;
    return [data[i], data[i + 1], data[i + 2]];
  }

  // 명시적 스택 기반 플러드필. 각 시드의 색과 비교.
  // 여러 시드를 모두 큐에 넣고, 인접 픽셀이 "그 시점 비교색"과 유사하면 확장.
  const stack = new Int32Array(N);
  let sp = 0;

  // 시드 등록
  for (const ci of cornerIdx) {
    if (!bg[ci]) {
      bg[ci] = 1;
      stack[sp++] = ci;
    }
  }

  // 비교 기준색: 모서리 평균색 (단색 배경 가정)
  let sr = 0, sg = 0, sb = 0;
  for (const ci of cornerIdx) {
    const c = colorAt(ci);
    sr += c[0]; sg += c[1]; sb += c[2];
  }
  sr = sr / cornerIdx.length;
  sg = sg / cornerIdx.length;
  sb = sb / cornerIdx.length;

  function isBgColor(p) {
    const i = p * 4;
    const dr = data[i]     - sr;
    const dg = data[i + 1] - sg;
    const db = data[i + 2] - sb;
    return (dr * dr + dg * dg + db * db) <= tol2;
  }

  while (sp > 0) {
    const p = stack[--sp];
    const x = p % w;
    const y = (p - x) / w;

    // 4방향 이웃
    if (x > 0)     { const q = p - 1; if (!bg[q] && isBgColor(q)) { bg[q] = 1; stack[sp++] = q; } }
    if (x < w - 1) { const q = p + 1; if (!bg[q] && isBgColor(q)) { bg[q] = 1; stack[sp++] = q; } }
    if (y > 0)     { const q = p - w; if (!bg[q] && isBgColor(q)) { bg[q] = 1; stack[sp++] = q; } }
    if (y < h - 1) { const q = p + w; if (!bg[q] && isBgColor(q)) { bg[q] = 1; stack[sp++] = q; } }
  }

  // 배경 픽셀 투명화 + 객체 바운딩 박스 계산
  let minX = w, minY = h, maxX = -1, maxY = -1;
  let kept = 0;
  for (let p = 0; p < N; p++) {
    if (bg[p]) {
      data[p * 4 + 3] = 0; // alpha 0
    } else {
      kept++;
      const x = p % w;
      const y = (p - x) / w;
      if (x < minX) minX = x;
      if (x > maxX) maxX = x;
      if (y < minY) minY = y;
      if (y > maxY) maxY = y;
    }
  }

  // 검출 실패 가드: 남은 게 거의 없음
  if (maxX < 0 || kept < N * MIN_OBJECT_RATIO) {
    return null;
  }

  // 가장자리 페더링: 배경에 인접한 객체 픽셀의 alpha를 약간 낮춤
  if (EDGE_FEATHER) {
    for (let p = 0; p < N; p++) {
      if (bg[p]) continue;
      const x = p % w;
      const y = (p - x) / w;
      let edge = false;
      if (x > 0 && bg[p - 1]) edge = true;
      else if (x < w - 1 && bg[p + 1]) edge = true;
      else if (y > 0 && bg[p - w]) edge = true;
      else if (y < h - 1 && bg[p + w]) edge = true;
      if (edge) data[p * 4 + 3] = 150;
    }
  }

  ctx.putImageData(imgData, 0, 0);

  // 바운딩 박스로 크롭
  const cw = maxX - minX + 1;
  const ch = maxY - minY + 1;
  const out = document.createElement("canvas");
  out.width = cw;
  out.height = ch;
  const octx = out.getContext("2d");
  octx.drawImage(srcCanvas, minX, minY, cw, ch, 0, 0, cw, ch);

  return {
    dataURL: out.toDataURL("image/png"),
    width: cw,
    height: ch,
    // 화면상 객체 중심 보정을 위한 상대 위치(0~1) within processed canvas
    cxRatio: (minX + cw / 2) / w,
    cyRatio: (minY + ch / 2) / h
  };
}

/* =========================================================
   채집 동작
   ========================================================= */
async function capture() {
  if (busy) return;
  if (!stream || !video.videoWidth) return;
  busy = true;
  captureBtn.disabled = true;

  // 플래시
  flashEl.classList.remove("fire");
  // 강제 리플로우로 애니메이션 재시작
  void flashEl.offsetWidth;
  flashEl.classList.add("fire");

  try {
    const crop = getSourceCropRect();
    if (!crop) { busy = false; captureBtn.disabled = false; return; }

    // 처리 캔버스 크기: 긴 변 MAX_DIM
    const srcAspect = crop.sWidth / crop.sHeight;
    let pw, ph;
    if (crop.sWidth >= crop.sHeight) {
      pw = Math.min(MAX_DIM, Math.round(crop.sWidth));
      ph = Math.round(pw / srcAspect);
    } else {
      ph = Math.min(MAX_DIM, Math.round(crop.sHeight));
      pw = Math.round(ph * srcAspect);
    }
    pw = Math.max(1, pw);
    ph = Math.max(1, ph);

    const proc = document.createElement("canvas");
    proc.width = pw;
    proc.height = ph;
    const pctx = proc.getContext("2d", { willReadFrequently: true });
    pctx.drawImage(
      video,
      crop.sx, crop.sy, crop.sWidth, crop.sHeight,
      0, 0, pw, ph
    );

    const result = removeBackground(proc);

    if (!result) {
      // 검출 실패 안내(가벼운 토스트 대용: 카운터 흔들기)
      bumpCounter(true);
      busy = false;
      captureBtn.disabled = false;
      return;
    }

    // 객체의 화면상 시작 위치(리티클 내 객체 중심)
    const r = crop.screen;
    const startCX = r.left + r.width  * result.cxRatio;
    const startCY = r.top  + r.height * result.cyRatio;

    await dropCutout(result.dataURL, result.width, result.height, startCX, startCY);

    addToTray(result.dataURL);
    count++;
    countEl.textContent = count;
    bumpCounter(false);
  } catch (e) {
    // 안전: 실패해도 앱은 살아있게
    console.error(e);
  } finally {
    busy = false;
    captureBtn.disabled = false;
  }
}

function bumpCounter(isFail) {
  const el = document.getElementById("counter");
  el.style.transition = "transform 120ms ease";
  el.style.transform = isFail ? "translateX(-4px)" : "scale(1.12)";
  setTimeout(() => { el.style.transform = "none"; }, 130);
}

/* 떨어지는 컷아웃 애니메이션: 객체 위치 → 트레이 */
function dropCutout(dataURL, natW, natH, startCX, startCY) {
  return new Promise((resolve) => {
    // 표시 크기: 화면에서 적당히 (긴 변 ~120px)
    const aspect = natW / natH;
    let dw, dh;
    if (aspect >= 1) { dw = 120; dh = 120 / aspect; }
    else { dh = 120; dw = 120 * aspect; }

    const sprite = document.createElement("div");
    sprite.className = "sprite";
    sprite.style.width = dw + "px";
    sprite.style.height = dh + "px";
    sprite.style.left = (startCX - dw / 2) + "px";
    sprite.style.top  = (startCY - dh / 2) + "px";
    const img = document.createElement("img");
    img.src = dataURL;
    sprite.appendChild(img);
    fxLayer.appendChild(sprite);

    // 목표: 트레이 영역 위쪽 가운데 근처
    const trayRect = tray.getBoundingClientRect();
    const stageRect = stage.getBoundingClientRect();
    const targetX = trayRect.left + trayRect.width * (0.2 + Math.random() * 0.6) - stageRect.left;
    const targetY = trayRect.top - stageRect.top - dh * 0.2;

    const fromX = parseFloat(sprite.style.left);
    const fromY = parseFloat(sprite.style.top);
    const dx = targetX - fromX;
    const dy = targetY - fromY;

    if (prefersReducedMotion) {
      sprite.remove();
      resolve();
      return;
    }

    // 두 단계: 살짝 떠오름 → 바운스하며 낙하
    const dur = 620;
    const start = performance.now();

    function easeOutBounce(t) {
      const n1 = 7.5625, d1 = 2.75;
      if (t < 1 / d1) return n1 * t * t;
      else if (t < 2 / d1) { t -= 1.5 / d1; return n1 * t * t + 0.75; }
      else if (t < 2.5 / d1) { t -= 2.25 / d1; return n1 * t * t + 0.9375; }
      else { t -= 2.625 / d1; return n1 * t * t + 0.984375; }
    }

    function frame(now) {
      const t = Math.min(1, (now - start) / dur);
      const ex = t; // x 선형
      const ey = easeOutBounce(t);
      const curX = dx * ex;
      const curY = dy * ey;
      const rot = (1 - t) * 14 * (dx >= 0 ? 1 : -1);
      const scale = 1 - 0.35 * t;
      sprite.style.transform =
        "translate(" + curX + "px," + curY + "px) rotate(" + rot + "deg) scale(" + scale + ")";
      sprite.style.opacity = t > 0.85 ? String(1 - (t - 0.85) / 0.15) : "1";
      if (t < 1) {
        requestAnimationFrame(frame);
      } else {
        sprite.remove();
        resolve();
      }
    }
    requestAnimationFrame(frame);
  });
}

function addToTray(dataURL) {
  const item = document.createElement("div");
  item.className = "item pop";
  const img = document.createElement("img");
  img.src = dataURL;
  item.appendChild(img);
  tray.appendChild(item);
  // 새 항목으로 스크롤
  tray.scrollTop = tray.scrollHeight;
  item.addEventListener("animationend", () => item.classList.remove("pop"), { once: true });
}

function clearTray() {
  tray.innerHTML = "";
  count = 0;
  countEl.textContent = "0";
}

// ---- 이벤트 ----
captureBtn.addEventListener("click", capture);
clearBtn.addEventListener("click", clearTray);

// 화면 탭(컨트롤 외 영역)으로도 채집 가능하게 — 편의
stage.addEventListener("click", (e) => {
  // 비디오 영역 직접 탭 시
  if (e.target === video || e.target === stage) capture();
});

// 탭 복귀 시 카메라가 멈춰있으면 재개
document.addEventListener("visibilitychange", () => {
  if (!document.hidden && video.paused && stream) {
    video.play().catch(() => {});
  }
});

// 시작
startCamera();
</script>
