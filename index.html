/* 비우기 (전체 삭제) */
function clearAll() {
  if (store.length === 0) { toast("이미 비어 있어요."); return; }
  if (!confirm("도감을 전부 비울까요? 되돌릴 수 없어요.")) return;
  store.length = 0;
  _natCache.clear();
  try { localStorage.removeItem(LS_KEY); } catch (_) {}
  nextId = 1;
  meta.captureDates = [];
  saveMeta();
  updateInvBadge(false);
  updateStats();
  invCountLabel.textContent = "0개";
  if (Phys.open) refreshInventoryView();
  toast("도감을 비웠어요.");
}
invClearBtn.addEventListener("click", clearAll);

/* =========================================================
   채집 도감 오버레이 — Matter.js 중력 + 드래그(MouseConstraint) + 탭→상세
   폴백: Matter 미정의 → 정적 그리드
   ========================================================= */
const Phys = {
  engine: null,
  runner: null,
  render: null,
  mouse: null,
  mouseConstraint: null,
  orientHandler: null,
  bodyById: new Map(),  // item.id -> body
  open: false,
  // tap vs drag 판별
  downPos: null,
  downBody: null,
  downTime: 0,
  moved: 0
};

function physicsAvailable() {
  return typeof window.Matter !== "undefined";
}

function openInventory() {
  if (Phys.open) return;
  Phys.open = true;
  inventoryEl.classList.add("show");
  invCountLabel.textContent = store.length + "개";
  refreshInventoryView();
}

function refreshInventoryView() {
  const empty = store.length === 0;
  invEmpty.classList.toggle("show", empty);
  invCountLabel.textContent = store.length + "개";

  // 항상 깨끗이 정리 후 재구성
  teardownPhysics();
  invGrid.classList.remove("show");
  invGrid.innerHTML = "";

  if (empty) {
    invCanvas.style.display = "none";
    return;
  }
  if (physicsAvailable()) {
    invCanvas.style.display = "block";
    requestAnimationFrame(() => buildPhysics());
  } else {
    invCanvas.style.display = "none";
    buildGrid();
  }
}

function closeInventory() {
  if (!Phys.open) return;
  Phys.open = false;
  inventoryEl.classList.remove("show");
  teardownPhysics();
  invGrid.classList.remove("show");
  invGrid.innerHTML = "";
}

/* 폴백 정적 그리드 (탭→상세) */
function buildGrid() {
  invGrid.innerHTML = "";
  for (const it of store) {
    const cell = document.createElement("div");
    cell.className = "gridItem rarity-" + (it.rarity || "common");
    const img = document.createElement("img");
    img.src = it.image;
    const nm = document.createElement("div");
    nm.className = "gName";
    nm.textContent = it.name || "이름 없음";
    cell.appendChild(img);
    cell.appendChild(nm);
    cell.addEventListener("click", () => openDetail(it.id));
    invGrid.appendChild(cell);
  }
  invGrid.classList.add("show");
}

/* Matter.js 물리 빌드 */
function buildPhysics() {
  if (!Phys.open) return;
  const M = window.Matter;
  const { Engine, Render, Runner, Bodies, Composite, Body, Mouse, MouseConstraint, Events } = M;

  const vw = invViewport.clientWidth;
  const vh = invViewport.clientHeight;
  if (vw < 2 || vh < 2) return;

  const dpr = window.devicePixelRatio || 1;
  const calm = prefersReducedMotion;

  const engine = Engine.create();
  engine.gravity.y = calm ? 1.5 : 1;
  engine.gravity.x = 0;

  const render = Render.create({
    canvas: invCanvas,
    engine: engine,
    options: {
      width: vw,
      height: vh,
      pixelRatio: dpr,
      wireframes: false,
      background: "transparent"
    }
  });

  const wallOpts = { isStatic: true, restitution: 0.2, friction: 0.6, render: { visible: false } };
  const floor = Bodies.rectangle(vw / 2, vh + WALL_THICK / 2, vw + WALL_THICK * 2, WALL_THICK, wallOpts);
  const left  = Bodies.rectangle(-WALL_THICK / 2, vh / 2, WALL_THICK, vh * 2, wallOpts);
  const right = Bodies.rectangle(vw + WALL_THICK / 2, vh / 2, WALL_THICK, vh * 2, wallOpts);
  const ceil  = Bodies.rectangle(vw / 2, -vh - WALL_THICK / 2, vw + WALL_THICK * 2, WALL_THICK, wallOpts);
  Composite.add(engine.world, [floor, left, right, ceil]);

  Phys.engine = engine;
  Phys.render = render;
  Phys.bodyById = new Map();
  Render.run(render);

  // epic 반짝임 오버레이
  Events.on(render, "afterRender", () => {
    if (!Phys.open) return;
    const ctx = render.context;
    const now = Date.now();
    Phys.bodyById.forEach((body, itemId) => {
      const it = findItem(itemId);
      if (!it || it.rarity !== "epic") return;
      const bx = body.bounds.min.x, by = body.bounds.min.y;
      const bw = body.bounds.max.x - bx, bh = body.bounds.max.y - by;
      const phase = (now / 900) % (Math.PI * 2);
      const glow = 0.45 + 0.45 * Math.sin(phase);
      ctx.save();
      ctx.globalAlpha = glow;
      ctx.strokeStyle = "#d060ff";
      ctx.lineWidth = 3;
      ctx.shadowBlur = 16;
      ctx.shadowColor = "#d060ff";
      ctx.strokeRect(bx, by, bw, bh);
      ctx.restore();
    });
  });

  const runner = Runner.create();
  Runner.run(runner, engine);
  Phys.runner = runner;

  // MouseConstraint — 집어서 드래그 (겹침은 충돌이 막아줌)
  const mouse = Mouse.create(render.canvas);
  // 캔버스가 dpr 스케일이어도 Mouse는 CSS px 기준. pixelRatio 보정.
  if (mouse.pixelRatio !== undefined) mouse.pixelRatio = dpr;
  const mouseConstraint = MouseConstraint.create(engine, {
    mouse: mouse,
    constraint: { stiffness: 0.2, render: { visible: false } }
  });
  Composite.add(engine.world, mouseConstraint);
  Phys.mouse = mouse;
  Phys.mouseConstraint = mouseConstraint;
  render.mouse = mouse;

  // tap vs drag 판별 (이동<8px & 빠름 = 탭 → 상세)
  Events.on(mouseConstraint, "mousedown", () => {
    Phys.downPos = { x: mouse.position.x, y: mouse.position.y };
    Phys.downBody = mouseConstraint.body || null;
    Phys.downTime = Date.now();
    Phys.moved = 0;
  });
  Events.on(mouseConstraint, "mousemove", () => {
    if (Phys.downPos) {
      const dx = mouse.position.x - Phys.downPos.x;
      const dy = mouse.position.y - Phys.downPos.y;
      const d = Math.hypot(dx, dy);
      if (d > Phys.moved) Phys.moved = d;
    }
  });
  Events.on(mouseConstraint, "mouseup", () => {
    const dt = Date.now() - Phys.downTime;
    const body = Phys.downBody;
    if (body && body.plugin && body.plugin.itemId != null && Phys.moved < 8 && dt < 400) {
      openDetail(body.plugin.itemId);
    } else if (body && Phys.moved >= 20) {
      // 빠른 드래그 = 던지기: velocity 증폭
      const vel = body.velocity;
      const speed = Math.hypot(vel.x, vel.y);
      if (speed > 1.5) {
        const factor = Math.min(3.5, 1.5 + speed * 0.18);
        Body.setVelocity(body, { x: vel.x * factor, y: vel.y * factor });
        Body.setAngularVelocity(body, body.angularVelocity * 1.8);
      }
    }
    Phys.downPos = null;
    Phys.downBody = null;
  });

  // 컷아웃 staggered 드롭
  const drops = store.slice();
  let i = 0;
  function dropNext() {
    if (!Phys.open || Phys.engine !== engine) return;
    if (i >= drops.length) return;
    const it = drops[i++];

    const iw = imgNatW(it), ih = imgNatH(it);
    const natMax = Math.max(iw, ih) || 1;
    let scale = PHYS_MAX_DIM / natMax;
    const minNat = Math.min(iw, ih) || 1;
    if (minNat * scale < PHYS_MIN_DIM) scale = PHYS_MIN_DIM / minNat;
    const bw = Math.max(8, iw * scale);
    const bh = Math.max(8, ih * scale);
    const xScale = bw / iw;
    const yScale = bh / ih;

    const x = bw / 2 + Math.random() * Math.max(1, (vw - bw));
    const y = -bh - Math.random() * 40;

    const body = Bodies.rectangle(x, y, bw, bh, {
      restitution: calm ? 0 : 0.2,
      friction: 0.6,
      frictionAir: calm ? 0.02 : 0.01,
      render: { sprite: { texture: it.image, xScale: xScale, yScale: yScale } }
    });
    body.plugin = { itemId: it.id };
    Phys.bodyById.set(it.id, body);
    if (!calm) Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.1);
    Composite.add(engine.world, body);

    if (i < drops.length) setTimeout(dropNext, DROP_STAGGER_MS);
  }
  dropNext();

  // deviceorientation 기울임 (선택)
  try {
    if (!prefersReducedMotion &&
        typeof window.DeviceOrientationEvent !== "undefined" &&
        typeof window.DeviceOrientationEvent.requestPermission !== "function") {
      const handler = (e) => {
        if (!Phys.engine || Phys.engine !== engine) return;
        const g = e.gamma, b = e.beta;
        if (g == null || b == null) return;
        engine.gravity.x = Math.max(-1, Math.min(1, g / 45));
        engine.gravity.y = Math.max(-1, Math.min(1, Math.max(0.2, b / 45)));
      };
      window.addEventListener("deviceorientation", handler);
      Phys.orientHandler = handler;
    }
  } catch (_) {}
}

// 컷아웃 자연 크기: 캐시된 Image 사용(없으면 추정 후 onload 갱신은 생략, 정사각 가정)
const _natCache = new Map();
function ensureNat(it) {
  if (_natCache.has(it.id)) return;
  const img = new Image();
  img.onload = () => { _natCache.set(it.id, { w: img.naturalWidth, h: img.naturalHeight }); };
  img.src = it.image;
  _natCache.set(it.id, { w: 0, h: 0 }); // placeholder
}
function imgNatW(it) { const n = _natCache.get(it.id); return (n && n.w) ? n.w : 100; }
function imgNatH(it) { const n = _natCache.get(it.id); return (n && n.h) ? n.h : 100; }

function teardownPhysics() {
  const M = window.Matter;
  if (Phys.orientHandler) {
    window.removeEventListener("deviceorientation", Phys.orientHandler);
    Phys.orientHandler = null;
  }
  if (M) {
    if (Phys.mouseConstraint && Phys.engine) {
      try { M.Composite.remove(Phys.engine.world, Phys.mouseConstraint); } catch (_) {}
    }
    if (Phys.render) {
      M.Render.stop(Phys.render);
      if (Phys.render.canvas) {
        const c = Phys.render.canvas;
        const cx = c.getContext("2d");
        if (cx) cx.clearRect(0, 0, c.width, c.height);
      }
      Phys.render.textures = {};
    }
    if (Phys.runner) M.Runner.stop(Phys.runner);
    if (Phys.engine) {
      M.Composite.clear(Phys.engine.world, false);
      M.Engine.clear(Phys.engine);
    }
  }
  Phys.render = null;
  Phys.runner = null;
  Phys.engine = null;
  Phys.mouse = null;
  Phys.mouseConstraint = null;
  Phys.bodyById = new Map();
  Phys.downPos = null;
  Phys.downBody = null;
}

/* =========================================================
   흔들기 — devicemotion / 대체 버튼
   ========================================================= */
const SHAKE_THRESHOLD = 20;
const SHAKE_COOLDOWN  = 1100;
let lastShakeTime = 0;
let shakeListening = false;

function doShake() {
  if (!Phys.open || !Phys.engine) return;
  const M = window.Matter;
  if (!M) return;
  Phys.bodyById.forEach((body) => {
    M.Body.setVelocity(body, {
      x: (Math.random() - 0.5) * 14,
      y: -8 - Math.random() * 10
    });
    M.Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.5);
  });
  playShakeSFX();
  vibrate([40, 30, 40]);
}

function handleDeviceMotion(e) {
  const now = Date.now();
  if (now - lastShakeTime < SHAKE_COOLDOWN) return;
  const acc = e.accelerationIncludingGravity;
  if (!acc) return;
  const mag = Math.sqrt((acc.x || 0) ** 2 + (acc.y || 0) ** 2 + (acc.z || 0) ** 2);
  if (mag > SHAKE_THRESHOLD) {
    lastShakeTime = now;
    doShake();
  }
}

function startListeningMotion() {
  if (shakeListening) return;
  shakeListening = true;
  window.addEventListener("devicemotion", handleDeviceMotion);
  invShakeBtn.textContent = "흔들기✓";
}

function setupDeviceMotion() {
  if (!window.DeviceMotionEvent) {
    invShakeBtn.addEventListener("click", doShake);
    return;
  }
  if (typeof DeviceMotionEvent.requestPermission === "function") {
    // iOS — 버튼 탭 시 권한 요청
    invShakeBtn.addEventListener("click", async () => {
      try {
        const res = await DeviceMotionEvent.requestPermission();
        if (res === "granted") startListeningMotion();
        else doShake(); // 권한 거부면 버튼 자체가 흔들기 대체
      } catch (_) { doShake(); }
    });
  } else {
    // Android / 데스크탑 — 바로 리슨 시작
    startListeningMotion();
    // 버튼 클릭 = 수동 흔들기
    invShakeBtn.addEventListener("click", doShake);
  }
}

/* =========================================================
   상세 화면 — 보기/정보 입력·수정/재누끼/삭제
   ========================================================= */
let detailId = null;
function findItem(id) { return store.find((x) => x.id === id) || null; }

function openDetail(id) {
  const it = findItem(id);
  if (!it) return;
  detailId = id;
  detailImg.src = it.image;
  detailTitle.textContent = it.name || "이름 없음";
  inName.value = it.name || "";
  inPlace.value = it.location || "";
  inNote.value = it.note || "";
  inDate.value = it.date || todayStr(it.createdAt);
  const sno = it.serialNo ? "No." + String(it.serialNo).padStart(3, "0") : "";
  const re = RARITY_TABLE.find(x => x.id === (it.rarity || "common")) || RARITY_TABLE[2];
  detailNoEl.innerHTML = sno
    ? `<span>${sno}</span><span class="rarity-badge ${it.rarity || "common"}">${re.label}</span>`
    : "";
  detailSheet.classList.add("show");
}
function closeDetail() { detailSheet.classList.remove("show"); detailId = null; }

/* 상세 정보 저장(이름/장소/메모/날짜) */
function saveDetail() {
  const it = findItem(detailId);
  if (!it) return;
  it.name = inName.value.trim();
  it.location = inPlace.value.trim();
  it.note = inNote.value.trim();
  it.date = inDate.value || todayStr(it.createdAt);
  persist();
  updateInvBadge(false);
  closeDetail();
  if (Phys.open) refreshInventoryView();
  toast("저장했어요.");
}

/* 상세에서 누끼 다시 다듬기 */
async function detailEditMask() {
  const it = findItem(detailId);
  if (!it) return;
  // 입력 중인 정보(이름/장소/메모/날짜)도 먼저 저장해 둠
  it.name = inName.value.trim();
  it.location = inPlace.value.trim();
  it.note = inNote.value.trim();
  it.date = inDate.value || todayStr(it.createdAt);
  const oc = await dataURLToCanvas(it.original || it.image);
  let mc;
  if (it.mask) mc = await dataURLToMaskCanvas(it.mask, oc.width, oc.height);
  else mc = fullMaskCanvas(oc.width, oc.height);
  closeDetail();
  openMaskEditor(oc, mc, (finalOrig, finalMask) => {
    // 재누끼 결과를 그대로 저장(정보는 유지)
    const cut = composeCutout(finalOrig, finalMask);
    it.image = cut.dataURL;
    it.original = finalOrig.toDataURL("image/jpeg", JPEG_Q);
    it.mask = finalMask.toDataURL("image/png");
    _natCache.delete(it.id);
    ensureNat(it);
    persist();
    updateInvBadge(false);
    if (Phys.open) refreshInventoryView();
    toast("누끼를 다시 저장했어요.");
  });
}

function detailDelete() {
  const it = findItem(detailId);
  if (!it) return;
  if (!confirm("이 채집물을 삭제할까요?")) return;
  const idx = store.findIndex((x) => x.id === detailId);
  if (idx >= 0) store.splice(idx, 1);
  _natCache.delete(it.id);
  persist();
  updateInvBadge(false);
  closeDetail();
  if (Phys.open) refreshInventoryView();
  toast("삭제했어요.");
}

detailCloseBtn.addEventListener("click", closeDetail);
detailSaveBtn.addEventListener("click", saveDetail);
detailEditMaskBtn.addEventListener("click", detailEditMask);
detailDeleteBtn.addEventListener("click", detailDelete);

/* dataURL → RGBA 캔버스 */
async function dataURLToCanvas(dataURL) {
  const img = await dataURLToImage(dataURL);
  const c = document.createElement("canvas");
  c.width = img.naturalWidth || img.width;
  c.height = img.naturalHeight || img.height;
  c.getContext("2d").drawImage(img, 0, 0);
  return c;
}
/* 저장된 mask dataURL(회색조) → 마스크 캔버스(w×h로 맞춤) */
async function dataURLToMaskCanvas(dataURL, w, h) {
  const img = await dataURLToImage(dataURL);
  const c = document.createElement("canvas");
  c.width = w; c.height = h;
  c.getContext("2d").drawImage(img, 0, 0, w, h);
  return c;
}
/* 전부 보이는(흰색) 마스크 캔버스 */
function fullMaskCanvas(w, h) {
  const c = document.createElement("canvas");
  c.width = w; c.height = h;
  const ctx = c.getContext("2d");
  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 0, w, h);
  return c;
}

/* =========================================================
   이벤트 바인딩 (메인)
   ========================================================= */
captureBtn.addEventListener("click", capture);
invBtn.addEventListener("click", openInventory);
invCloseBtn.addEventListener("click", closeInventory);

// 화면 탭으로도 채집 (편집/입력/상세 화면이 떠있지 않을 때만)
stage.addEventListener("click", (e) => {
  if (editorEl.classList.contains("show") ||
      detailSheet.classList.contains("show") ||
      inventoryEl.classList.contains("show")) return;
  if (e.target === video || e.target === stage) capture();
});

document.addEventListener("visibilitychange", () => {
  if (!document.hidden && video.paused && stream) {
    video.play().catch(() => {});
  }
});

// 화면 회전/리사이즈 시 에디터 뷰 재맞춤
window.addEventListener("resize", () => {
  if (Editor.active) {
    fitEditorView();
    renderEditor();
  }
});

/* =========================================================
   시작
   ========================================================= */
loadMeta();
loadStore();
// 저장된 컷아웃 자연 크기 미리 로드(물리용)
for (const it of store) ensureNat(it);
updateInvBadge(false);
updateStats();
editUndoBtn.disabled = true;
setupDeviceMotion();
startCamera();
</script>
