<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0e0f13" />
<title>채집 도감</title>
<style>
  :root {
    --bg: #0e0f13;
    --panel: #16181f;
    --panel-2: #1d2029;
    --line: #2a2e3a;
    --accent: #7CFFB2;
    --accent-2: #28c97a;
    --text: #e8ebf2;
    --muted: #9aa1b1;
    --danger: #ff6b6b;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
  }

  #app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
  }

  /* ===== Camera stage ===== */
  #stage {
    position: relative;
    flex: 1 1 auto;
    min-height: 0;
    overflow: hidden;
    background: #000;
  }

  #video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* dimmed mask outside the reticle */
  #mask {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: rgba(0,0,0,0.35);
    -webkit-mask:
      linear-gradient(#000 0 0) content-box,
      linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
  }

  /* Reticle frame (centered square-ish) */
  #reticle {
    position: absolute;
    left: 50%;
    top: 46%;
    transform: translate(-50%, -50%);
    width: min(72vw, 320px);
    height: min(72vw, 320px);
    border-radius: 18px;
    pointer-events: none;
    box-shadow: 0 0 0 100vmax rgba(0,0,0,0.34);
  }
  #reticle::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 18px;
    border: 2px solid rgba(124,255,178,0.0);
  }
  /* corner brackets */
  .corner {
    position: absolute;
    width: 28px;
    height: 28px;
    border: 3px solid var(--accent);
    border-radius: 4px;
  }
  .corner.tl { top: -2px; left: -2px; border-right: none; border-bottom: none; border-top-left-radius: 14px; }
  .corner.tr { top: -2px; right: -2px; border-left: none; border-bottom: none; border-top-right-radius: 14px; }
  .corner.bl { bottom: -2px; left: -2px; border-right: none; border-top: none; border-bottom-left-radius: 14px; }
  .corner.br { bottom: -2px; right: -2px; border-left: none; border-top: none; border-bottom-right-radius: 14px; }

  #reticle .hint {
    position: absolute;
    left: 50%;
    bottom: -34px;
    transform: translateX(-50%);
    white-space: nowrap;
    font-size: 13px;
    color: var(--muted);
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }

  /* Counter badge */
  #counter {
    position: absolute;
    top: calc(env(safe-area-inset-top, 0px) + 14px);
    left: 14px;
    z-index: 5;
    background: rgba(20,22,28,0.72);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  #counter b { color: var(--accent); }

  /* Flash overlay */
  #flash {
    position: absolute;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 9;
  }
  #flash.fire {
    animation: flash 360ms ease-out;
  }
  @keyframes flash {
    0% { opacity: 0; }
    8% { opacity: 0.85; }
    100% { opacity: 0; }
  }

  /* ===== Controls ===== */
  #controls {
    position: relative;
    z-index: 6;
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 14px 22px calc(14px + env(safe-area-inset-bottom, 0px));
    background: linear-gradient(180deg, rgba(14,15,19,0.0), rgba(14,15,19,0.9) 40%, var(--bg));
  }

  /* 사진 가져오기 button — bottom-left, mirrors #invBtn */
  #photoBtn {
    flex: 0 0 auto;
    width: 64px; height: 64px;
    border-radius: 16px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #photoBtn:active { background: #262a35; }

  /* Capture button */
  #captureBtn {
    flex: 0 0 auto;
    width: 84px; height: 84px;
    border-radius: 50%;
    border: none;
    background: radial-gradient(circle at 50% 38%, var(--accent), var(--accent-2));
    color: #06210f;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 0 0 6px rgba(124,255,178,0.14), 0 8px 18px rgba(0,0,0,0.5);
    transition: transform 90ms ease;
  }
  #captureBtn:active { transform: scale(0.92); }
  #captureBtn:disabled { opacity: 0.5; cursor: default; }

  /* 채집물(inventory) open button — bottom-right corner */
  #invBtn {
    position: relative;
    flex: 0 0 auto;
    width: 64px; height: 64px;
    border-radius: 16px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #invBtn:active { background: #262a35; }
  #invBadge {
    position: absolute;
    top: -6px; right: -6px;
    min-width: 22px; height: 22px;
    padding: 0 6px;
    border-radius: 999px;
    background: var(--accent);
    color: #06210f;
    font-size: 12px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    transform-origin: center;
  }
  #invBadge.bump { animation: badgeBump 320ms cubic-bezier(.18,1.5,.5,1); }
  @keyframes badgeBump {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); }
    100% { transform: scale(1); }
  }

  /* ===== Inventory overlay (채집물) — physics pile ===== */
  #inventory {
    position: fixed;
    inset: 0;
    z-index: 40;
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.012) 0 12px, rgba(255,255,255,0) 12px 24px),
      var(--panel);
    display: none;
    flex-direction: column;
  }
  #inventory.show { display: flex; }
  #invHeader {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: calc(env(safe-area-inset-top, 0px) + 14px) 18px 12px;
    z-index: 2;
  }
  #invTitle { font-size: 17px; font-weight: 800; letter-spacing: 0.3px; }
  #invTitle small { color: var(--muted); font-weight: 600; font-size: 13px; margin-left: 6px; }
  #invHeader .btns { display: flex; gap: 10px; }
  #invHeader .btns button {
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    background: var(--panel-2);
    color: var(--muted);
  }
  #invHeader .btns button:active { background: #262a35; }
  #invCloseBtn { background: var(--accent) !important; color: #06210f !important; border-color: transparent !important; }

  #invViewport {
    position: relative;
    flex: 1 1 auto;
    min-height: 0;
    overflow: hidden;
  }
  #invCanvas { position: absolute; inset: 0; display: block; touch-action: none; }

  /* fallback static grid */
  #invGrid {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 12px 12px calc(12px + env(safe-area-inset-bottom, 0px));
    display: none;
    flex-wrap: wrap;
    align-content: flex-start;
    gap: 10px;
    -webkit-overflow-scrolling: touch;
  }
  #invGrid.show { display: flex; }
  .gridItem {
    width: 92px;
    height: 110px;
    border-radius: 12px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex: 0 0 auto;
    cursor: pointer;
    padding: 4px;
  }
  .gridItem img { max-width: 90%; max-height: 70%; object-fit: contain; }
  .gridItem .gName {
    font-size: 11px; color: var(--muted); margin-top: 4px;
    max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  #invEmpty {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
  }
  #invEmpty.show { display: flex; }

  /* ===== Overlay (errors / guidance) ===== */
  #overlay {
    position: fixed;
    inset: 0;
    z-index: 90;
    background: rgba(8,9,12,0.92);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 28px;
    text-align: center;
  }
  #overlay.show { display: flex; }
  #overlay .card {
    max-width: 360px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 28px 24px;
  }
  #overlay h2 { margin: 0 0 12px; font-size: 19px; }
  #overlay p { margin: 0 0 18px; color: var(--muted); font-size: 14px; line-height: 1.6; }
  #overlay button {
    background: var(--accent);
    color: #06210f;
    border: none;
    border-radius: 12px;
    padding: 12px 22px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  #overlay .emoji { font-size: 40px; margin-bottom: 10px; }

  /* ===== Generic full-screen sheet (editor / info / detail) ===== */
  .sheet {
    position: fixed;
    inset: 0;
    z-index: 60;
    background: var(--bg);
    display: none;
    flex-direction: column;
  }
  .sheet.show { display: flex; }
  .sheetHead {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: calc(env(safe-area-inset-top, 0px) + 12px) 16px 10px;
    border-bottom: 1px solid var(--line);
  }
  .sheetHead h2 { margin: 0; font-size: 16px; font-weight: 800; }
  .sheetBody {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .sheetFoot {
    flex: 0 0 auto;
    display: flex;
    gap: 10px;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
    border-top: 1px solid var(--line);
    background: var(--panel);
  }
  .btn {
    flex: 1 1 0;
    min-height: 54px;
    border-radius: 14px;
    border: 1px solid var(--line);
    background: var(--panel-2);
    color: var(--text);
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn:active { background: #262a35; }
  .btn.primary { background: var(--accent); color: #06210f; border-color: transparent; }
  .btn.primary:active { filter: brightness(0.92); }
  .btn.danger { background: #2a1416; color: var(--danger); border-color: #4a2226; }
  .btn.ghost { background: transparent; }
  .btn.small { min-height: 44px; font-size: 14px; flex: 0 0 auto; padding: 0 16px; }
  .btn[disabled] { opacity: 0.5; cursor: default; }

  /* ===== Mask editor ===== */
  #editStageWrap {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background:
      repeating-conic-gradient(#1a1d25 0% 25%, #23262f 0% 50%) 50% / 22px 22px;
    touch-action: none;
  }
  #editCanvas {
    position: absolute;
    left: 0; top: 0;
    display: block;
    touch-action: none;
  }
  #editTools {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 10px 16px;
    border-top: 1px solid var(--line);
    background: var(--panel);
  }
  #editTools .row { display: flex; gap: 10px; align-items: center; }
  #editTools .toolBtn {
    flex: 1 1 0;
    min-height: 50px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: var(--panel-2);
    color: var(--text);
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
  }
  #editTools .toolBtn.active { background: var(--accent); color: #06210f; border-color: transparent; }
  #editTools .toolBtn.active.erase { background: #ff9aa2; color: #2a0d10; }
  #brushRow { gap: 12px; }
  #brushRow label { font-size: 13px; color: var(--muted); white-space: nowrap; }
  #brushSize { flex: 1 1 auto; height: 36px; }
  #editHint { font-size: 12px; color: var(--muted); text-align: center; }

  /* ===== Form (info input / detail edit) ===== */
  .form { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .form .preview {
    align-self: center;
    width: 180px; height: 180px;
    border-radius: 16px;
    background:
      repeating-conic-gradient(#1a1d25 0% 25%, #23262f 0% 50%) 50% / 18px 18px;
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .form .preview img { max-width: 92%; max-height: 92%; object-fit: contain; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 13px; font-weight: 700; color: var(--muted); }
  .field label .req { color: var(--accent); margin-left: 4px; }
  .field input, .field textarea {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    color: var(--text);
    font-size: 16px;
    padding: 13px 14px;
    font-family: inherit;
  }
  .field input:focus, .field textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .field textarea { min-height: 80px; resize: vertical; }
  .field .err { font-size: 12px; color: var(--danger); display: none; }
  .field.invalid .err { display: block; }
  .field.invalid input { border-color: var(--danger); }
  .locRow { display: flex; gap: 8px; }
  .locRow input { flex: 1 1 auto; }
  .locRow button {
    flex: 0 0 auto;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: var(--panel-2);
    color: var(--text);
    font-size: 13px; font-weight: 700;
    padding: 0 14px;
    cursor: pointer;
  }
  .detailMeta { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 10px; }
  .detailMeta .mrow { display: flex; gap: 10px; font-size: 14px; }
  .detailMeta .mrow .k { color: var(--muted); width: 64px; flex: 0 0 auto; }
  .detailMeta .mrow .v { color: var(--text); white-space: pre-wrap; word-break: break-word; }

  /* small loader toast */
  #loader {
    position: fixed;
    left: 50%;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 120px);
    transform: translateX(-50%);
    z-index: 80;
    background: rgba(20,22,28,0.92);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    display: none;
    align-items: center;
    gap: 10px;
  }
  #loader.show { display: flex; }
  #loader .spin {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.25);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* toast (quota / errors) */
  #toast {
    position: fixed;
    left: 50%;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 90px);
    transform: translateX(-50%) translateY(20px);
    z-index: 95;
    max-width: 88vw;
    background: rgba(30,16,18,0.96);
    border: 1px solid #4a2226;
    color: #ffd9dc;
    border-radius: 14px;
    padding: 12px 16px;
    font-size: 13px;
    line-height: 1.5;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms ease, transform 200ms ease;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (prefers-reduced-motion: reduce) {
    #flash.fire { animation-duration: 120ms; }
    #invBadge.bump { animation: none; }
    #loader .spin { animation-duration: 1.6s; }
  }

  /* ===== 음소거 버튼 ===== */
  #muteBtn {
    position: absolute;
    top: calc(env(safe-area-inset-top, 0px) + 14px);
    right: 14px;
    z-index: 5;
    width: 38px; height: 38px;
    border-radius: 50%;
    background: rgba(20,22,28,0.72);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--line);
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  #muteBtn:active { background: #262a35; }

  /* ===== counter 통계 확장 ===== */
  #counter { display: flex; gap: 8px; align-items: center; flex-wrap: nowrap; }
  #counter .sep { color: var(--line); }
  #counter .stat-today, #counter .stat-streak { font-size: 12px; font-weight: 600; color: var(--muted); }
  #counter .stat-streak b { color: #ff9f43; }

  /* ===== 획득 팝 ===== */
  #capturePop {
    position: fixed;
    inset: 0;
    z-index: 99;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    opacity: 0;
  }
  #capturePop.fire { animation: capturePopAnim 900ms cubic-bezier(.18,1.4,.4,1) forwards; }
  #capturePopInner {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 16px 28px;
    border-radius: 20px;
    background: rgba(14,15,19,0.82);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 2px solid var(--capture-pop-color, var(--accent));
    box-shadow: 0 0 24px var(--capture-pop-color, var(--accent));
  }
  #capturePopRarity { font-size: 13px; font-weight: 700; letter-spacing: 1px; color: var(--capture-pop-color, var(--accent)); }
  #capturePopText { font-size: 28px; font-weight: 900; color: var(--text); letter-spacing: 2px; }
  @keyframes capturePopAnim {
    0%   { opacity:0; transform: scale(0.5); }
    15%  { opacity:1; transform: scale(1.18); }
    40%  { opacity:1; transform: scale(0.96); }
    65%  { opacity:1; transform: scale(1.02); }
    85%  { opacity:0.9; transform: scale(1); }
    100% { opacity:0; transform: scale(1.04); }
  }
  @media (prefers-reduced-motion: reduce) {
    #capturePop.fire { animation: capturePopFade 600ms ease forwards; }
    @keyframes capturePopFade { 0%{opacity:0} 20%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
  }

  /* ===== 희귀도 ===== */
  :root {
    --rarity-common: #888888;
    --rarity-rare: #60b0ff;
    --rarity-epic: #d060ff;
  }
  .rarity-rare  { border-color: var(--rarity-rare)  !important; }
  .rarity-epic  { border-color: var(--rarity-epic)  !important;
                  animation: epicGlow 1.6s ease-in-out infinite; }
  @keyframes epicGlow {
    0%,100% { box-shadow: 0 0 6px 1px rgba(208,96,255,0.4); }
    50%     { box-shadow: 0 0 18px 5px rgba(208,96,255,0.75); }
  }
  @media (prefers-reduced-motion: reduce) {
    .rarity-epic { animation: none; box-shadow: 0 0 10px 3px rgba(208,96,255,0.55); }
  }
  .rarity-badge {
    display: inline-block;
    font-size: 10px; font-weight: 800; letter-spacing: 0.5px;
    padding: 1px 6px; border-radius: 999px;
    border: 1px solid;
  }
  .rarity-badge.common { color: var(--rarity-common); border-color: var(--rarity-common); }
  .rarity-badge.rare   { color: var(--rarity-rare);   border-color: var(--rarity-rare); }
  .rarity-badge.epic   { color: var(--rarity-epic);   border-color: var(--rarity-epic);
                          text-shadow: 0 0 8px rgba(208,96,255,0.8); }

  /* ===== 상세 No. 배지 ===== */
  #detailNo {
    font-size: 12px; font-weight: 700; color: var(--muted);
    letter-spacing: 0.5px; padding: 0 16px 0;
    display: flex; gap: 8px; align-items: center;
    margin-bottom: -6px; margin-top: 4px;
  }

  /* ===== 업적 배지 시트 ===== */
  #badgeSheet { z-index: 65; }
  .badgeList { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
  .badgeItem {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px; border-radius: 16px;
    background: var(--panel-2); border: 1px solid var(--line);
  }
  .badgeItem.earned { border-color: var(--accent); }
  .badgeItem .bi-icon { font-size: 28px; min-width: 36px; text-align: center; }
  .badgeItem .bi-info { display: flex; flex-direction: column; gap: 2px; }
  .badgeItem .bi-label { font-size: 15px; font-weight: 800; }

</style>

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
<script>
"use strict";

/* =========================================================
   학생용 동식물 채집 도감 — 단일 파일 바닐라 웹앱
   - 채집(카메라) 또는 사진 가져오기 → 자동 누끼(플러드필) → 수동 누끼 편집 → 바로 저장
   - 정보(이름/장소/메모/날짜)는 상세 화면에서 입력/수정
   - 도감(채집물): Matter.js 중력 물리 + 드래그(MouseConstraint), 탭 → 상세, 폴백=정적 그리드
   - localStorage 자동 저장, 백업(JSON) 내보내기/불러오기, 사진 가져오기(갤러리)
   ========================================================= */

// ---- 튜닝 상수 (배경 제거: 폴백 플러드필) ----
const MAX_DIM = 640;
const TOLERANCE = 14;
const EDGE_SAMPLES = 12;
const FEATHER_PX = 1;
const MIN_BLOB_PX = 24;
const HOLE_MAX_PX = Infinity;
const MIN_OBJECT_RATIO = 0.004;

// ---- 튜닝 상수 (물리) ----
const PHYS_MAX_DIM = 110;
const PHYS_MIN_DIM = 40;
const DROP_STAGGER_MS = 130;
const WALL_THICK = 80;

// ---- 희귀도 테이블 (prob 합 = 100) ----
const RARITY_TABLE = [
  { id: "epic",   label: "✨전설", color: "#d060ff", prob: 5  },
  { id: "rare",   label: "💎희귀", color: "#60b0ff", prob: 25 },
  { id: "common", label: "일반",   color: "#888888", prob: 70 }
];

// ---- 업적 테이블 ----
const ACHIEVEMENTS = [
  { id: "first",      emoji: "🌿", label: "첫 채집",      desc: "첫 번째 채집물을 획득하세요",      check: (s) => s.length >= 1 },
  { id: "ten",        emoji: "🔟", label: "10종 채집",    desc: "채집물을 10개 모으세요",            check: (s) => s.length >= 10 },
  { id: "thirty",     emoji: "🏆", label: "30종 채집",    desc: "채집물을 30개 모으세요",            check: (s) => s.length >= 30 },
  { id: "epic_first", emoji: "✨", label: "첫 전설",      desc: "전설 등급 채집물을 획득하세요",      check: (s) => s.some(it => it.rarity === "epic") },
  { id: "day5",       emoji: "⚡", label: "하루 5채집",   desc: "하루에 채집물 5개를 모으세요",       check: (s) => { const t = todayStr(); return s.filter(it => it.date === t).length >= 5; } },
  { id: "streak3",    emoji: "🔥", label: "3일 연속",     desc: "3일 연속 채집하세요",               check: () => computeStreak() >= 3 }
];

// ---- 저장 ----
const LS_KEY = "collect-cam.v2";
const LS_META_KEY = "collect-cam.meta";
const JPEG_Q = 0.82;        // original 스냅샷 저장 압축률
const MASK_KEY_PREFIX = "m"; // (사용 안함, 예약)

// ---- DOM ----
const video      = document.getElementById("video");
const stage      = document.getElementById("stage");
const reticleEl  = document.getElementById("reticle");
const captureBtn = document.getElementById("captureBtn");
const countEl    = document.getElementById("count");
const flashEl    = document.getElementById("flash");
const overlay    = document.getElementById("overlay");
const ovTitle    = document.getElementById("ovTitle");
const ovMsg      = document.getElementById("ovMsg");
const ovBtn      = document.getElementById("ovBtn");

const photoBtn     = document.getElementById("photoBtn");
const invBtn       = document.getElementById("invBtn");
const invBadge     = document.getElementById("invBadge");
const inventoryEl  = document.getElementById("inventory");
const invViewport  = document.getElementById("invViewport");
const invCanvas    = document.getElementById("invCanvas");
const invGrid      = document.getElementById("invGrid");
const invEmpty     = document.getElementById("invEmpty");
const invCloseBtn  = document.getElementById("invCloseBtn");
const invPhotoBtn  = document.getElementById("invPhotoBtn");
const invClearBtn  = document.getElementById("invClearBtn");
const invExportBtn = document.getElementById("invExportBtn");
const invImportBtn = document.getElementById("invImportBtn");
const invCountLabel= document.getElementById("invCountLabel");
const importFile   = document.getElementById("importFile");
const photoFile    = document.getElementById("photoFile");

const loaderEl   = document.getElementById("loader");
const loaderMsg  = document.getElementById("loaderMsg");
const toastEl    = document.getElementById("toast");

// editor DOM
const editorEl     = document.getElementById("editor");
const editStageWrap= document.getElementById("editStageWrap");
const editCanvas   = document.getElementById("editCanvas");
const toolEraseBtn = document.getElementById("toolErase");
const toolRestoreBtn = document.getElementById("toolRestore");
const brushSizeEl  = document.getElementById("brushSize");
const editUndoBtn  = document.getElementById("editUndoBtn");
const editCancelBtn= document.getElementById("editCancelBtn");
const editDoneBtn  = document.getElementById("editDoneBtn");

// detail DOM (정보 입력/수정 포함)
const detailSheet  = document.getElementById("detailSheet");
const detailTitle  = document.getElementById("detailTitle");
const detailImg    = document.getElementById("detailImg");
const inName       = document.getElementById("inName");
const inPlace      = document.getElementById("inPlace");
const inNote       = document.getElementById("inNote");
const inDate       = document.getElementById("inDate");
const detailCloseBtn   = document.getElementById("detailCloseBtn");
const detailEditMaskBtn= document.getElementById("detailEditMaskBtn");
const detailDeleteBtn  = document.getElementById("detailDeleteBtn");
const detailSaveBtn    = document.getElementById("detailSaveBtn");

const muteBtn        = document.getElementById("muteBtn");
const countTodayEl   = document.getElementById("countToday");
const countStreakEl  = document.getElementById("countStreak");
const invShakeBtn    = document.getElementById("invShakeBtn");
const invBadgeBtn    = document.getElementById("invBadgeBtn");
const capturePopEl   = document.getElementById("capturePop");
const capturePopRarityEl = document.getElementById("capturePopRarity");
const badgeSheetEl   = document.getElementById("badgeSheet");
const badgeListEl    = document.getElementById("badgeList");
const badgeCloseBtn  = document.getElementById("badgeCloseBtn");
const badgeToastEl   = document.getElementById("badgeToast");
const detailNoEl     = document.getElementById("detailNo");

const prefersReducedMotion =
  window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

let stream = null;
let count = 0;
let busy = false;

/* 채집물 저장소(메모리/영구):
   각 item = { id, image, original, mask, name, location, note, date, createdAt }
   image    = 투명 PNG dataURL(표시용 컷아웃, bbox 크롭)
   original = 스냅샷 dataURL(JPEG, ≤MAX_DIM) — 재편집용
   mask     = 알파 마스크 dataURL(PNG, 회색조 알파, original과 동일 크기) — 재편집용
*/
const store = [];
let nextId = 1;

// ---- 전역 메타 ----
let meta = { nextSerialNo: 1, earnedBadges: [], captureDates: [] };

// ---- 메타 저장/로드 ----
function loadMeta() {
  try {
    const raw = localStorage.getItem(LS_META_KEY);
    if (!raw) return;
    const obj = JSON.parse(raw);
    if (typeof obj.nextSerialNo === "number") meta.nextSerialNo = obj.nextSerialNo;
    if (Array.isArray(obj.earnedBadges)) meta.earnedBadges = obj.earnedBadges;
    if (Array.isArray(obj.captureDates)) meta.captureDates = obj.captureDates;
  } catch (_) {}
}
function saveMeta() {
  try { localStorage.setItem(LS_META_KEY, JSON.stringify(meta)); } catch (_) {}
}

// ---- WebAudio 효과음 ----
let audioCtx = null;
let muteSound = false;
function getAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (_) {}
  }
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume().catch(() => {});
  return audioCtx;
}
function playTone(freq, type, gain, startT, dur, ctx) {
  const osc = ctx.createOscillator();
  const g   = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startT);
  g.gain.setValueAtTime(0, startT);
  g.gain.linearRampToValueAtTime(gain, startT + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, startT + dur);
  osc.connect(g); g.connect(ctx.destination);
  osc.start(startT); osc.stop(startT + dur + 0.01);
}
function playCaptureSFX(rarity) {
  if (muteSound) return;
  const ctx = getAudioCtx(); if (!ctx) return;
  const t = ctx.currentTime;
  if (rarity === "epic") {
    playTone(523, "sine",   0.18, t,        0.35, ctx);
    playTone(659, "sine",   0.14, t + 0.08, 0.35, ctx);
    playTone(784, "sine",   0.12, t + 0.16, 0.40, ctx);
    playTone(1047,"triangle",0.08,t + 0.24, 0.45, ctx);
  } else if (rarity === "rare") {
    playTone(440, "sine",   0.16, t,        0.28, ctx);
    playTone(660, "sine",   0.13, t + 0.06, 0.35, ctx);
  } else {
    playTone(880, "sine",   0.15, t,        0.18, ctx);
    playTone(1100,"triangle",0.06,t + 0.04, 0.22, ctx);
  }
}
function playShakeSFX() {
  if (muteSound) return;
  const ctx = getAudioCtx(); if (!ctx) return;
  const t = ctx.currentTime;
  playTone(200, "sawtooth", 0.10, t,        0.12, ctx);
  playTone(160, "sawtooth", 0.08, t + 0.05, 0.14, ctx);
}

// ---- 진동 ----
function vibrate(pattern) {
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (_) {}
}

// ---- 음소거 토글 ----
function toggleMute() {
  muteSound = !muteSound;
  muteBtn.textContent = muteSound ? "🔇" : "🔊";
}
muteBtn.addEventListener("click", toggleMute);

// ---- 획득 팝 연출 ----
let popTimer = null;
function showCapturePop(rarity) {
  if (prefersReducedMotion && rarity === "common") return;
  const r = RARITY_TABLE.find(x => x.id === rarity) || RARITY_TABLE[2];
  capturePopEl.style.setProperty("--capture-pop-color", r.color);
  capturePopRarityEl.textContent = r.label;
  capturePopEl.classList.remove("fire");
  void capturePopEl.offsetWidth;
  capturePopEl.classList.add("fire");
  if (popTimer) clearTimeout(popTimer);
  popTimer = setTimeout(() => capturePopEl.classList.remove("fire"), 1000);
}

// ---- 희귀도 굴림 ----
function rollRarity() {
  const r = Math.random() * 100;
  let acc = 0;
  for (const entry of RARITY_TABLE) {
    acc += entry.prob;
    if (r < acc) return entry.id;
  }
  return "common";
}

// ---- 스트릭 계산 ----
function computeStreak() {
  const dates = [...new Set(meta.captureDates)].sort().reverse();
  if (!dates.length) return 0;
  let streak = 0;
  let cur = todayStr();
  for (const d of dates) {
    const diff = Math.round((new Date(cur) - new Date(d)) / 86400000);
    if (diff === 0 || diff === 1) { streak++; cur = d; }
    else break;
  }
  return streak;
}

// ---- 통계 업데이트 ----
function updateStats() {
  countEl.textContent = String(store.length);
  const today = todayStr();
  countTodayEl.textContent = String(store.filter(it => it.date === today).length);
  countStreakEl.textContent = String(computeStreak());
}

// ---- 업적 체크 ----
let badgeToastTimer = null;
function showBadgeToast(ach) {
  badgeToastEl.textContent = "";
  const span = document.createElement("span");
  span.textContent = ach.emoji + " 업적 달성! " + ach.label;
  badgeToastEl.appendChild(span);
  badgeToastEl.classList.add("show");
  if (badgeToastTimer) clearTimeout(badgeToastTimer);
  badgeToastTimer = setTimeout(() => badgeToastEl.classList.remove("show"), 3500);
}
function checkAchievements() {
  for (const ach of ACHIEVEMENTS) {
    if (meta.earnedBadges.includes(ach.id)) continue;
    let ok = false;
    try { ok = ach.check(store); } catch (_) {}
    if (ok) {
      meta.earnedBadges.push(ach.id);
      saveMeta();
      showBadgeToast(ach);
    }
  }
}

// ---- 배지 시트 ----
function openBadgeSheet() {
  badgeListEl.innerHTML = "";
  for (const ach of ACHIEVEMENTS) {
    const earned = meta.earnedBadges.includes(ach.id);
    const div = document.createElement("div");
    div.className = "badgeItem" + (earned ? " earned" : "");
    div.innerHTML =
      `<div class="bi-icon">${ach.emoji}</div>` +
      `<div class="bi-info"><div class="bi-label">${ach.label}</div><div class="bi-desc">${ach.desc}</div></div>` +
      `<div class="bi-tag">${earned ? "달성" : "미달성"}</div>`;
    badgeListEl.appendChild(div);
  }
  badgeSheetEl.classList.add("show");
}
function closeBadgeSheet() { badgeSheetEl.classList.remove("show"); }
badgeCloseBtn.addEventListener("click", closeBadgeSheet);
invBadgeBtn.addEventListener("click", openBadgeSheet);

// ---- 토스트/로더 ----
let toastTimer = null;
function toast(msg, ms) {
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove("show"), ms || 3200);
}
function showLoader(msg) {
  loaderMsg.textContent = msg || "처리 중…";
  loaderEl.classList.add("show");
}
function hideLoader() { loaderEl.classList.remove("show"); }

// ---- 오버레이 헬퍼 ----
function showOverlay(title, msg, btnLabel, onClick) {
  ovTitle.textContent = title;
  ovMsg.innerHTML = msg;
  if (btnLabel) {
    ovBtn.style.display = "inline-block";
    ovBtn.textContent = btnLabel;
    ovBtn.onclick = onClick || (() => location.reload());
  } else {
    ovBtn.style.display = "none";
  }
  overlay.classList.add("show");
}
function hideOverlay() { overlay.classList.remove("show"); }

// ---- 카메라 시작 ----
async function startCamera() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showOverlay("카메라를 쓸 수 없어요",
      "이 브라우저는 카메라 접근(getUserMedia)을 지원하지 않아요.<br>최신 Chrome/Safari에서 열어 주세요.",
      "새로고침");
    return;
  }
  if (!window.isSecureContext) {
    showOverlay("https가 필요해요",
      "카메라는 보안 연결(https)에서만 작동해요.<br>GitHub Pages 주소(https://…) 또는 localhost로 열어 주세요.",
      "새로고침");
    return;
  }

  showOverlay("카메라를 준비 중…", "권한 요청을 허용해 주세요.", null);

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      audio: false,
      video: {
        facingMode: { ideal: "environment" },
        width:  { ideal: 1920 },
        height: { ideal: 1080 }
      }
    });
    video.srcObject = stream;
    await video.play().catch(() => {});

    await new Promise((res) => {
      if (video.readyState >= 2 && video.videoWidth) return res();
      video.onloadedmetadata = () => res();
    });

    hideOverlay();
  } catch (err) {
    handleCameraError(err);
  }
}

function handleCameraError(err) {
  const name = err && err.name ? err.name : "";
  if (name === "NotAllowedError" || name === "SecurityError" || name === "PermissionDeniedError") {
    showOverlay("카메라 권한이 거부됐어요",
      "브라우저 주소창의 자물쇠 아이콘 → 카메라 권한을 '허용'으로 바꾼 뒤 다시 시도해 주세요.",
      "다시 시도", startCamera);
  } else if (name === "NotFoundError" || name === "DevicesNotFoundError" || name === "OverconstrainedError") {
    showOverlay("카메라를 찾지 못했어요",
      "후면 카메라를 찾지 못했어요. 기기에 카메라가 있는지 확인해 주세요.",
      "다시 시도", startCamera);
  } else {
    showOverlay("카메라를 열 수 없어요",
      "알 수 없는 오류가 발생했어요." + (name ? "<br>(" + name + ")" : ""),
      "다시 시도", startCamera);
  }
}

/* =========================================================
   리티클 → 비디오 소스 크롭 사각형 계산 (object-fit: cover 역변환)
   ========================================================= */
function getSourceCropRect() {
  const vw = video.videoWidth;
  const vh = video.videoHeight;
  if (!vw || !vh) return null;

  const stageRect = stage.getBoundingClientRect();
  const dispW = stageRect.width;
  const dispH = stageRect.height;

  const scale = Math.max(dispW / vw, dispH / vh);
  const drawnW = vw * scale;
  const drawnH = vh * scale;
  const offsetX = (dispW - drawnW) / 2;
  const offsetY = (dispH - drawnH) / 2;

  const r = reticleEl.getBoundingClientRect();
  const rx = r.left - stageRect.left;
  const ry = r.top  - stageRect.top;

  let sx = (rx - offsetX) / scale;
  let sy = (ry - offsetY) / scale;
  let sWidth  = r.width  / scale;
  let sHeight = r.height / scale;

  sx = Math.max(0, Math.min(sx, vw - 1));
  sy = Math.max(0, Math.min(sy, vh - 1));
  sWidth  = Math.max(1, Math.min(sWidth,  vw - sx));
  sHeight = Math.max(1, Math.min(sHeight, vh - sy));

  return { sx, sy, sWidth, sHeight, screen: r, stageRect };
}

/* =========================================================
   색공간: sRGB → 선형 → XYZ → LAB
   ========================================================= */
function srgbToLinear(c) {
  c /= 255;
  return c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
}
function labF(t) {
  return t > 0.008856451679035631 ? Math.cbrt(t) : (7.787037037037035 * t + 16 / 116);
}
const LAB_XN = 0.95047, LAB_YN = 1.0, LAB_ZN = 1.08883;
function rgbToLab(r, g, b) {
  const rl = srgbToLinear(r), gl = srgbToLinear(g), bl = srgbToLinear(b);
  const X = rl * 0.4124564 + gl * 0.3575761 + bl * 0.1804375;
  const Y = rl * 0.2126729 + gl * 0.7151522 + bl * 0.0721750;
  const Z = rl * 0.0193339 + gl * 0.1191920 + bl * 0.9503041;
  const fx = labF(X / LAB_XN);
  const fy = labF(Y / LAB_YN);
  const fz = labF(Z / LAB_ZN);
  const L = 116 * fy - 16;
  const A = 500 * (fx - fy);
  const B = 200 * (fy - fz);
  return [L, A, B];
}

/* =========================================================
   폴백 배경 제거 (플러드필) — 알파 마스크(Uint8ClampedArray, N) 반환
   재귀 없음. 실패시 null.
   반환: { alpha: Uint8Array(N), w, h } 또는 null
   ========================================================= */
function heuristicMask(srcCanvas) {
  const w = srcCanvas.width;
  const h = srcCanvas.height;
  const ctx = srcCanvas.getContext("2d", { willReadFrequently: true });
  const imgData = ctx.getImageData(0, 0, w, h);
  const data = imgData.data;
  const N = w * h;

  const labL = new Float32Array(N);
  const labA = new Float32Array(N);
  const labB = new Float32Array(N);
  for (let p = 0; p < N; p++) {
    const i = p * 4;
    const lab = rgbToLab(data[i], data[i + 1], data[i + 2]);
    labL[p] = lab[0]; labA[p] = lab[1]; labB[p] = lab[2];
  }

  const seedPts = [];
  const samp = Math.max(2, EDGE_SAMPLES);
  for (let s = 0; s < samp; s++) {
    const fx = Math.round((w - 1) * (s / (samp - 1)));
    const fy = Math.round((h - 1) * (s / (samp - 1)));
    seedPts.push(fy * w + 0);
    seedPts.push(fy * w + (w - 1));
    seedPts.push(0 * w + fx);
    seedPts.push((h - 1) * w + fx);
  }
  const bgL = [], bgA = [], bgB = [];
  for (const sp0 of seedPts) {
    bgL.push(labL[sp0]); bgA.push(labA[sp0]); bgB.push(labB[sp0]);
  }
  const Mn = bgL.length;
  const tol2 = TOLERANCE * TOLERANCE;

  function isBgColor(p) {
    const Lp = labL[p], Ap = labA[p], Bp = labB[p];
    for (let k = 0; k < Mn; k++) {
      const dL = Lp - bgL[k];
      const dA = Ap - bgA[k];
      const dB = Bp - bgB[k];
      if (dL * dL + dA * dA + dB * dB <= tol2) return true;
    }
    return false;
  }

  const bg = new Uint8Array(N);
  const stack = new Int32Array(N);
  let sp = 0;
  function trySeed(p) {
    if (!bg[p] && isBgColor(p)) { bg[p] = 1; stack[sp++] = p; }
  }
  for (let x = 0; x < w; x++) { trySeed(x); trySeed((h - 1) * w + x); }
  for (let y = 0; y < h; y++) { trySeed(y * w); trySeed(y * w + (w - 1)); }

  while (sp > 0) {
    const p = stack[--sp];
    const x = p % w;
    const y = (p - x) / w;
    if (x > 0)     { const q = p - 1; if (!bg[q] && isBgColor(q)) { bg[q] = 1; stack[sp++] = q; } }
    if (x < w - 1) { const q = p + 1; if (!bg[q] && isBgColor(q)) { bg[q] = 1; stack[sp++] = q; } }
    if (y > 0)     { const q = p - w; if (!bg[q] && isBgColor(q)) { bg[q] = 1; stack[sp++] = q; } }
    if (y < h - 1) { const q = p + w; if (!bg[q] && isBgColor(q)) { bg[q] = 1; stack[sp++] = q; } }
  }

  // 구멍 메움
  const reachable = new Uint8Array(N);
  let qp = 0;
  const queue = stack;
  for (let x = 0; x < w; x++) {
    let p = x;                 if (bg[p] && !reachable[p]) { reachable[p] = 1; queue[qp++] = p; }
    p = (h - 1) * w + x;       if (bg[p] && !reachable[p]) { reachable[p] = 1; queue[qp++] = p; }
  }
  for (let y = 0; y < h; y++) {
    let p = y * w;             if (bg[p] && !reachable[p]) { reachable[p] = 1; queue[qp++] = p; }
    p = y * w + (w - 1);       if (bg[p] && !reachable[p]) { reachable[p] = 1; queue[qp++] = p; }
  }
  while (qp > 0) {
    const p = queue[--qp];
    const x = p % w;
    const y = (p - x) / w;
    if (x > 0)     { const q = p - 1; if (bg[q] && !reachable[q]) { reachable[q] = 1; queue[qp++] = q; } }
    if (x < w - 1) { const q = p + 1; if (bg[q] && !reachable[q]) { reachable[q] = 1; queue[qp++] = q; } }
    if (y > 0)     { const q = p - w; if (bg[q] && !reachable[q]) { reachable[q] = 1; queue[qp++] = q; } }
    if (y < h - 1) { const q = p + w; if (bg[q] && !reachable[q]) { reachable[q] = 1; queue[qp++] = q; } }
  }
  for (let p = 0; p < N; p++) {
    if (bg[p] && !reachable[p]) bg[p] = 0;
  }

  // 작은 speck 제거
  const seen = new Uint8Array(N);
  const comp = new Int32Array(N);
  for (let start = 0; start < N; start++) {
    if (bg[start] || seen[start]) continue;
    let cp = 0;
    comp[cp++] = start;
    seen[start] = 1;
    let head = 0;
    while (head < cp) {
      const p = comp[head++];
      const x = p % w;
      const y = (p - x) / w;
      if (x > 0)     { const q = p - 1; if (!bg[q] && !seen[q]) { seen[q] = 1; comp[cp++] = q; } }
      if (x < w - 1) { const q = p + 1; if (!bg[q] && !seen[q]) { seen[q] = 1; comp[cp++] = q; } }
      if (y > 0)     { const q = p - w; if (!bg[q] && !seen[q]) { seen[q] = 1; comp[cp++] = q; } }
      if (y < h - 1) { const q = p + w; if (!bg[q] && !seen[q]) { seen[q] = 1; comp[cp++] = q; } }
    }
    if (cp < MIN_BLOB_PX) {
      for (let k = 0; k < cp; k++) bg[comp[k]] = 1;
    }
  }

  // 알파 빌드 (전경=255)
  const alpha = new Uint8Array(N);
  let kept = 0;
  for (let p = 0; p < N; p++) {
    if (!bg[p]) { alpha[p] = 255; kept++; }
  }
  if (kept < N * MIN_OBJECT_RATIO) return null;

  // 페더 (알파만 박스블러)
  if (FEATHER_PX > 0) featherAlphaArray(alpha, w, h, FEATHER_PX);

  return { alpha, w, h };
}

/* 알파 배열(Uint8Array, N) 박스블러 — 분리형 */
function featherAlphaArray(alpha, w, h, radius) {
  const N = w * h;
  const a = new Float32Array(N);
  for (let p = 0; p < N; p++) a[p] = alpha[p];
  const tmp = new Float32Array(N);
  const win = radius * 2 + 1;

  for (let y = 0; y < h; y++) {
    const row = y * w;
    let sum = 0;
    for (let k = -radius; k <= radius; k++) {
      const xx = Math.min(w - 1, Math.max(0, k));
      sum += a[row + xx];
    }
    for (let x = 0; x < w; x++) {
      tmp[row + x] = sum / win;
      const xOut = x - radius;
      const xIn = x + radius + 1;
      sum -= a[row + Math.min(w - 1, Math.max(0, xOut))];
      sum += a[row + Math.min(w - 1, Math.max(0, xIn))];
    }
  }
  for (let x = 0; x < w; x++) {
    let sum = 0;
    for (let k = -radius; k <= radius; k++) {
      const yy = Math.min(h - 1, Math.max(0, k));
      sum += tmp[yy * w + x];
    }
    for (let y = 0; y < h; y++) {
      a[y * w + x] = sum / win;
      const yOut = y - radius;
      const yIn = y + radius + 1;
      sum -= tmp[Math.min(h - 1, Math.max(0, yOut)) * w + x];
      sum += tmp[Math.min(h - 1, Math.max(0, yIn)) * w + x];
    }
  }
  for (let p = 0; p < N; p++) {
    let v = a[p];
    if (v < 0) v = 0; else if (v > 255) v = 255;
    alpha[p] = v | 0;
  }
}

function dataURLToImage(dataURL) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = rej;
    img.src = dataURL;
  });
}

/* =========================================================
   채집 동작 — 스냅샷 → 자동 누끼(플러드필) → 누끼 편집기 → 바로 저장
   ========================================================= */
async function capture() {
  if (busy) return;
  if (!stream || !video.videoWidth) return;
  busy = true;
  captureBtn.disabled = true;

  flashEl.classList.remove("fire");
  void flashEl.offsetWidth;
  flashEl.classList.add("fire");

  try {
    const crop = getSourceCropRect();
    if (!crop) { busy = false; captureBtn.disabled = false; return; }

    const srcAspect = crop.sWidth / crop.sHeight;
    let pw, ph;
    if (crop.sWidth >= crop.sHeight) {
      pw = Math.min(MAX_DIM, Math.round(crop.sWidth));
      ph = Math.round(pw / srcAspect);
    } else {
      ph = Math.min(MAX_DIM, Math.round(crop.sHeight));
      pw = Math.round(ph * srcAspect);
    }
    pw = Math.max(1, pw);
    ph = Math.max(1, ph);

    const proc = document.createElement("canvas");
    proc.width = pw;
    proc.height = ph;
    const pctx = proc.getContext("2d", { willReadFrequently: true });
    pctx.drawImage(
      video,
      crop.sx, crop.sy, crop.sWidth, crop.sHeight,
      0, 0, pw, ph
    );

    // original 스냅샷(JPEG, 저장 공간 절약)
    const originalCanvas = document.createElement("canvas");
    originalCanvas.width = pw; originalCanvas.height = ph;
    originalCanvas.getContext("2d").drawImage(proc, 0, 0);

    // 1) 자동 누끼 = 플러드필(빠름, 동기)
    let maskInfo = null;
    try { maskInfo = heuristicMask(proc); } catch (e) { maskInfo = null; }

    // 2) 마스크 캔버스 구성 (없으면 전체 불투명으로 시작 — 사용자가 손으로 지움)
    const maskCanvas = buildMaskCanvas(maskInfo, pw, ph);

    // 3) 누끼 편집기 진입 → 완료시 바로 저장
    busy = false;
    captureBtn.disabled = false;
    openMaskEditor(originalCanvas, maskCanvas, (finalOriginal, finalMask) => {
      saveNewItem(finalOriginal, finalMask);
    });
  } catch (e) {
    console.error(e);
    hideLoader();
    busy = false;
    captureBtn.disabled = false;
  }
}

/* 알파 배열(Uint8, N)을 maskCanvas에 회색조(흰=불투명)로 기록.
   maskCanvas는 알파를 RGB 흰색 강도로 저장: 픽셀 = (a,a,a,255) */
function writeAlphaToMaskCanvas(maskCanvas, alpha, w, h) {
  const ctx = maskCanvas.getContext("2d");
  const img = ctx.createImageData(w, h);
  const d = img.data;
  for (let p = 0; p < w * h; p++) {
    const a = alpha[p];
    d[p * 4] = a; d[p * 4 + 1] = a; d[p * 4 + 2] = a; d[p * 4 + 3] = 255;
  }
  ctx.putImageData(img, 0, 0);
}

/* maskInfo(또는 null) → 마스크 캔버스. null이면 전체 흰색(전부 보이게). */
function buildMaskCanvas(maskInfo, w, h) {
  const maskCanvas = document.createElement("canvas");
  maskCanvas.width = w; maskCanvas.height = h;
  if (maskInfo) {
    writeAlphaToMaskCanvas(maskCanvas, maskInfo.alpha, w, h);
  } else {
    const mctx = maskCanvas.getContext("2d");
    mctx.fillStyle = "#fff";
    mctx.fillRect(0, 0, w, h);
    toast("자동 배경 제거가 잘 안 됐어요. 손으로 다듬어 주세요.");
  }
  return maskCanvas;
}

/* 누끼 편집 완료 → 정보 없이 바로 도감에 저장. (이름/장소/메모는 상세에서 입력) */
function saveNewItem(originalCanvas, maskCanvas) {
  const cut = composeCutout(originalCanvas, maskCanvas);
  const rarity = rollRarity();
  const serialNo = meta.nextSerialNo++;
  const it = {
    id: nextId++,
    image: cut.dataURL,
    original: originalCanvas.toDataURL("image/jpeg", JPEG_Q),
    mask: maskCanvas.toDataURL("image/png"),
    name: "",
    location: "",
    note: "",
    date: todayStr(),
    createdAt: Date.now(),
    serialNo: serialNo,
    rarity: rarity
  };
  store.push(it);
  ensureNat(it);

  const today = todayStr();
  if (!meta.captureDates.includes(today)) meta.captureDates.push(today);

  const ok = persist();
  saveMeta();
  if (ok) {
    updateInvBadge(true);
    bumpCounter(false);
    updateStats();
    showCapturePop(rarity);
    playCaptureSFX(rarity);
    vibrate(rarity === "epic" ? [30,20,30,20,60] : rarity === "rare" ? [30,20,50] : [40]);
    const rarityEntry = RARITY_TABLE.find(x => x.id === rarity);
    toast("도감에 담았어요" + (rarity !== "common" ? " · " + (rarityEntry ? rarityEntry.label : "") : ""));
  }
  checkAchievements();
  if (Phys.open) refreshInventoryView();
}

/* 사진 가져오기(갤러리) → proc 캔버스(≤MAX_DIM, 전체 이미지) → 누끼 편집 → 저장 */
function importPhotoFile(file) {
  if (!file || !/^image\//.test(file.type || "")) {
    toast("이미지 파일을 골라 주세요.");
    return;
  }
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      try {
        const iw = img.naturalWidth || img.width;
        const ih = img.naturalHeight || img.height;
        if (!iw || !ih) { toast("사진을 열지 못했어요."); return; }
        // 긴 변을 MAX_DIM 이하로(가로세로 비율 유지)
        let pw, ph;
        if (iw >= ih) {
          pw = Math.min(MAX_DIM, iw);
          ph = Math.max(1, Math.round(pw * ih / iw));
        } else {
          ph = Math.min(MAX_DIM, ih);
          pw = Math.max(1, Math.round(ph * iw / ih));
        }
        const proc = document.createElement("canvas");
        proc.width = pw; proc.height = ph;
        proc.getContext("2d", { willReadFrequently: true }).drawImage(img, 0, 0, pw, ph);

        const originalCanvas = document.createElement("canvas");
        originalCanvas.width = pw; originalCanvas.height = ph;
        originalCanvas.getContext("2d").drawImage(proc, 0, 0);

        let maskInfo = null;
        try { maskInfo = heuristicMask(proc); } catch (e) { maskInfo = null; }
        const maskCanvas = buildMaskCanvas(maskInfo, pw, ph);

        // 도감이 열려 있으면 편집기 위에 가리므로 닫아 둠
        if (Phys.open) closeInventory();
        openMaskEditor(originalCanvas, maskCanvas, (finalOriginal, finalMask) => {
          saveNewItem(finalOriginal, finalMask);
        });
      } catch (e) {
        console.error(e);
        toast("사진이 너무 크거나 열 수 없어요.");
      }
    };
    img.onerror = () => toast("사진을 열지 못했어요.");
    img.src = String(reader.result);
  };
  reader.onerror = () => toast("사진을 읽지 못했어요.");
  reader.readAsDataURL(file);
}

function bumpCounter(isFail) {
  const el = document.getElementById("counter");
  el.style.transition = "transform 120ms ease";
  el.style.transform = isFail ? "translateX(-4px)" : "scale(1.12)";
  setTimeout(() => { el.style.transform = "none"; }, 130);
}

function updateInvBadge(animate) {
  invBadge.textContent = String(store.length);
  countEl.textContent = String(store.length);
  count = store.length;
  if (animate && !prefersReducedMotion) {
    invBadge.classList.remove("bump");
    void invBadge.offsetWidth;
    invBadge.classList.add("bump");
  }
}

/* =========================================================
   누끼 편집기 — 재사용 가능: openMaskEditor(originalCanvas, maskCanvas, onDone)
   - originalCanvas: RGBA 스냅샷(≤MAX_DIM)
   - maskCanvas: 알파(흰=불투명) 회색조 캔버스, 동일 크기
   - onDone(finalOriginalCanvas, finalMaskCanvas)
   체커보드 합성 표시 + 지우기/복원 브러시 + 확대/이동 + 되돌리기
   ========================================================= */
const Editor = {
  original: null,   // canvas
  mask: null,       // canvas (working copy)
  octx: null,       // editCanvas 2d ctx
  iw: 0, ih: 0,
  tool: "erase",    // "erase" | "restore"
  brush: 26,
  zoom: 1, panX: 0, panY: 0,
  minZoom: 1, maxZoom: 8,
  undoStack: [],    // ImageData snapshots of mask
  UNDO_CAP: 8,
  onDone: null,
  active: false,
  // pointer state
  pointers: new Map(),
  painting: false,
  lastImg: null,    // last paint point in image coords
  pinch: null
};

function openMaskEditor(originalCanvas, maskCanvas, onDone) {
  Editor.original = originalCanvas;
  Editor.iw = originalCanvas.width;
  Editor.ih = originalCanvas.height;
  // 작업용 복사본
  const mc = document.createElement("canvas");
  mc.width = Editor.iw; mc.height = Editor.ih;
  mc.getContext("2d").drawImage(maskCanvas, 0, 0);
  Editor.mask = mc;
  Editor.onDone = onDone;
  Editor.tool = "erase";
  Editor.brush = parseInt(brushSizeEl.value, 10) || 26;
  Editor.undoStack = [];
  Editor.pointers.clear();
  Editor.painting = false;
  Editor.pinch = null;
  Editor.active = true;

  setTool("erase");
  editorEl.classList.add("show");

  // 레이아웃 확정 후 fit
  requestAnimationFrame(() => {
    fitEditorView();
    renderEditor();
  });
}

function closeMaskEditor() {
  Editor.active = false;
  editorEl.classList.remove("show");
  Editor.pointers.clear();
  Editor.painting = false;
  Editor.pinch = null;
}

function setTool(t) {
  Editor.tool = t;
  toolEraseBtn.classList.toggle("active", t === "erase");
  toolRestoreBtn.classList.toggle("active", t === "restore");
}

/* 화면에 이미지를 contain으로 맞추는 초기 zoom/pan 계산 */
function fitEditorView() {
  const W = editStageWrap.clientWidth;
  const H = editStageWrap.clientHeight;
  if (W < 2 || H < 2) return;
  const dpr = window.devicePixelRatio || 1;
  // 표시 캔버스를 뷰포트 픽셀 크기로
  editCanvas.width = Math.round(W * dpr);
  editCanvas.height = Math.round(H * dpr);
  editCanvas.style.width = W + "px";
  editCanvas.style.height = H + "px";
  Editor.octx = editCanvas.getContext("2d");
  Editor.viewW = W; Editor.viewH = H; Editor.dpr = dpr;

  const fit = Math.min(W / Editor.iw, H / Editor.ih) * 0.92;
  Editor.minZoom = fit;
  Editor.maxZoom = fit * 12;
  Editor.zoom = fit;
  // 가운데 정렬
  Editor.panX = (W - Editor.iw * fit) / 2;
  Editor.panY = (H - Editor.ih * fit) / 2;
}

/* 이미지좌표 → 화면(CSS px): screen = img*zoom + pan */
/* 화면(CSS px) → 이미지좌표: img = (screen - pan) / zoom */
function screenToImage(sx, sy) {
  return {
    x: (sx - Editor.panX) / Editor.zoom,
    y: (sy - Editor.panY) / Editor.zoom
  };
}

/* 체커보드 위에 original×mask 합성을 zoom/pan으로 그림 */
function renderEditor() {
  if (!Editor.active) return;
  const ctx = Editor.octx;
  const dpr = Editor.dpr;
  const W = Editor.viewW, H = Editor.viewH;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);

  // 합성된 컷아웃(투명 PNG처럼)을 임시 캔버스에 만든다
  const comp = getCompositeCanvas();

  ctx.imageSmoothingEnabled = Editor.zoom < 3; // 확대시 픽셀 또렷
  ctx.drawImage(
    comp,
    0, 0, Editor.iw, Editor.ih,
    Editor.panX, Editor.panY,
    Editor.iw * Editor.zoom, Editor.ih * Editor.zoom
  );
}

/* original을 mask 알파로 잘라낸 합성 캔버스 (재사용 버퍼) */
let _compCanvas = null, _compCtx = null;
function getCompositeCanvas() {
  if (!_compCanvas) {
    _compCanvas = document.createElement("canvas");
  }
  if (_compCanvas.width !== Editor.iw || _compCanvas.height !== Editor.ih) {
    _compCanvas.width = Editor.iw;
    _compCanvas.height = Editor.ih;
    _compCtx = _compCanvas.getContext("2d");
  }
  const ctx = _compCtx;
  ctx.clearRect(0, 0, Editor.iw, Editor.ih);
  ctx.globalCompositeOperation = "source-over";
  ctx.drawImage(Editor.original, 0, 0);
  // mask의 흰색강도를 알파로: destination-in 하려면 mask를 알파로 변환 필요.
  // mask 캔버스는 (a,a,a,255)이므로, 알파 캔버스를 만든다.
  ctx.globalCompositeOperation = "destination-in";
  ctx.drawImage(getMaskAlphaCanvas(), 0, 0);
  ctx.globalCompositeOperation = "source-over";
  return _compCanvas;
}

/* mask(회색조,a,a,a,255) → 알파 캔버스(흰색, 알파=강도) 변환 버퍼 */
let _maskAlphaCanvas = null, _maskAlphaCtx = null;
function getMaskAlphaCanvas() {
  if (!_maskAlphaCanvas) _maskAlphaCanvas = document.createElement("canvas");
  if (_maskAlphaCanvas.width !== Editor.iw || _maskAlphaCanvas.height !== Editor.ih) {
    _maskAlphaCanvas.width = Editor.iw;
    _maskAlphaCanvas.height = Editor.ih;
    _maskAlphaCtx = _maskAlphaCanvas.getContext("2d", { willReadFrequently: true });
  }
  const mctx = Editor.mask.getContext("2d", { willReadFrequently: true });
  const src = mctx.getImageData(0, 0, Editor.iw, Editor.ih);
  const out = _maskAlphaCtx.createImageData(Editor.iw, Editor.ih);
  const s = src.data, o = out.data;
  for (let p = 0; p < Editor.iw * Editor.ih; p++) {
    o[p * 4] = 255; o[p * 4 + 1] = 255; o[p * 4 + 2] = 255;
    o[p * 4 + 3] = s[p * 4]; // R채널 = 알파강도
  }
  _maskAlphaCtx.putImageData(out, 0, 0);
  return _maskAlphaCanvas;
}

/* 되돌리기용 마스크 스냅샷 push */
function pushUndo() {
  const mctx = Editor.mask.getContext("2d");
  try {
    const snap = mctx.getImageData(0, 0, Editor.iw, Editor.ih);
    Editor.undoStack.push(snap);
    if (Editor.undoStack.length > Editor.UNDO_CAP) Editor.undoStack.shift();
  } catch (e) { /* 무시 */ }
  editUndoBtn.disabled = Editor.undoStack.length === 0;
}
function doUndo() {
  if (Editor.undoStack.length === 0) return;
  const snap = Editor.undoStack.pop();
  Editor.mask.getContext("2d").putImageData(snap, 0, 0);
  editUndoBtn.disabled = Editor.undoStack.length === 0;
  renderEditor();
}

/* 브러시로 mask에 칠하기. erase→검정(알파0), restore→흰색(알파255).
   p0,p1 = 이미지좌표. 선분으로 보간해 끊김 없게. */
function paintStroke(p0, p1) {
  const ctx = Editor.mask.getContext("2d");
  // 화면 브러시 크기를 이미지좌표로 환산 (화면px / zoom)
  const r = Math.max(1, (Editor.brush / Editor.zoom));
  ctx.save();
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.lineWidth = r * 2;
  ctx.strokeStyle = (Editor.tool === "erase") ? "#000" : "#fff";
  ctx.fillStyle = ctx.strokeStyle;
  ctx.beginPath();
  ctx.moveTo(p0.x, p0.y);
  ctx.lineTo(p1.x, p1.y);
  ctx.stroke();
  // 점 끝 채움(단일 탭 대응)
  ctx.beginPath();
  ctx.arc(p1.x, p1.y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

/* ---- 에디터 포인터 (Pointer Events: 1손가락=칠하기, 2손가락=핀치 줌/팬) ---- */
function editPointerDown(e) {
  if (!Editor.active) return;
  editCanvas.setPointerCapture && editCanvas.setPointerCapture(e.pointerId);
  Editor.pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (Editor.pointers.size === 1) {
    // 칠하기 시작
    Editor.painting = true;
    pushUndo();
    const rect = editCanvas.getBoundingClientRect();
    const img = screenToImage(e.clientX - rect.left, e.clientY - rect.top);
    Editor.lastImg = img;
    paintStroke(img, img);
    renderEditor();
  } else if (Editor.pointers.size === 2) {
    // 핀치 시작 → 칠하기 취소(방금 push한 undo 되돌림)
    if (Editor.painting) {
      Editor.painting = false;
      if (Editor.undoStack.length) {
        const snap = Editor.undoStack.pop();
        Editor.mask.getContext("2d").putImageData(snap, 0, 0);
        editUndoBtn.disabled = Editor.undoStack.length === 0;
      }
    }
    startPinch();
    renderEditor();
  }
}

function editPointerMove(e) {
  if (!Editor.active) return;
  if (!Editor.pointers.has(e.pointerId)) return;
  Editor.pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (Editor.pointers.size >= 2 && Editor.pinch) {
    updatePinch();
    renderEditor();
    return;
  }
  if (Editor.painting && Editor.pointers.size === 1) {
    const rect = editCanvas.getBoundingClientRect();
    const img = screenToImage(e.clientX - rect.left, e.clientY - rect.top);
    paintStroke(Editor.lastImg || img, img);
    Editor.lastImg = img;
    renderEditor();
  }
}

function editPointerUp(e) {
  if (!Editor.pointers.has(e.pointerId)) return;
  Editor.pointers.delete(e.pointerId);
  try { editCanvas.releasePointerCapture(e.pointerId); } catch (_) {}
  if (Editor.pointers.size < 2) Editor.pinch = null;
  if (Editor.pointers.size === 0) {
    Editor.painting = false;
    Editor.lastImg = null;
  }
}

function pinchCenterAndDist() {
  const pts = Array.from(Editor.pointers.values());
  const rect = editCanvas.getBoundingClientRect();
  const a = { x: pts[0].x - rect.left, y: pts[0].y - rect.top };
  const b = { x: pts[1].x - rect.left, y: pts[1].y - rect.top };
  return {
    cx: (a.x + b.x) / 2,
    cy: (a.y + b.y) / 2,
    dist: Math.hypot(a.x - b.x, a.y - b.y)
  };
}
function startPinch() {
  const pc = pinchCenterAndDist();
  // 핀치 중심의 이미지좌표 고정점
  const imgAnchor = screenToImage(pc.cx, pc.cy);
  Editor.pinch = { startDist: pc.dist, startZoom: Editor.zoom, anchorImg: imgAnchor, lastCx: pc.cx, lastCy: pc.cy };
}
function updatePinch() {
  const pc = pinchCenterAndDist();
  const k = pc.dist / (Editor.pinch.startDist || 1);
  let z = Editor.pinch.startZoom * k;
  z = Math.max(Editor.minZoom, Math.min(Editor.maxZoom, z));
  Editor.zoom = z;
  // anchor 이미지점이 현재 핀치 중심에 오도록 pan 조정 + 중심 이동(팬)
  Editor.panX = pc.cx - Editor.pinch.anchorImg.x * z;
  Editor.panY = pc.cy - Editor.pinch.anchorImg.y * z;
}

/* mask(working) → 알파 dataURL(PNG, 회색조) 로 직렬화(저장용) */
function maskToDataURL(maskCanvas) {
  return maskCanvas.toDataURL("image/png");
}

/* original + mask → 표시용 투명 PNG(컷아웃, bbox 크롭) dataURL + 크기 */
function composeCutout(originalCanvas, maskCanvas) {
  const w = originalCanvas.width, h = originalCanvas.height;
  // 알파 캔버스
  const mctx = maskCanvas.getContext("2d", { willReadFrequently: true });
  const md = mctx.getImageData(0, 0, w, h).data;

  // bbox
  let minX = w, minY = h, maxX = -1, maxY = -1;
  for (let p = 0; p < w * h; p++) {
    if (md[p * 4] > 12) {
      const x = p % w, y = (p - (p % w)) / w;
      if (x < minX) minX = x;
      if (x > maxX) maxX = x;
      if (y < minY) minY = y;
      if (y > maxY) maxY = y;
    }
  }
  if (maxX < 0) { minX = 0; minY = 0; maxX = w - 1; maxY = h - 1; }
  const cw = maxX - minX + 1, ch = maxY - minY + 1;

  // 합성 캔버스(전체) → 크롭
  const full = document.createElement("canvas");
  full.width = w; full.height = h;
  const fctx = full.getContext("2d");
  fctx.drawImage(originalCanvas, 0, 0);
  // 알파 적용
  const alphaCanvas = document.createElement("canvas");
  alphaCanvas.width = w; alphaCanvas.height = h;
  const actx = alphaCanvas.getContext("2d");
  const aimg = actx.createImageData(w, h);
  for (let p = 0; p < w * h; p++) {
    aimg.data[p * 4] = 255; aimg.data[p * 4 + 1] = 255; aimg.data[p * 4 + 2] = 255;
    aimg.data[p * 4 + 3] = md[p * 4];
  }
  actx.putImageData(aimg, 0, 0);
  fctx.globalCompositeOperation = "destination-in";
  fctx.drawImage(alphaCanvas, 0, 0);
  fctx.globalCompositeOperation = "source-over";

  const out = document.createElement("canvas");
  out.width = cw; out.height = ch;
  out.getContext("2d").drawImage(full, minX, minY, cw, ch, 0, 0, cw, ch);
  return { dataURL: out.toDataURL("image/png"), w: cw, h: ch };
}

// 에디터 이벤트 바인딩
editCanvas.addEventListener("pointerdown", editPointerDown);

editCanvas.addEventListener("pointercancel", editPointerUp);

function todayStr(d) {
  const dt = d ? new Date(d) : new Date();
  const y = dt.getFullYear();
  const m = String(dt.getMonth() + 1).padStart(2, "0");
  const day = String(dt.getDate()).padStart(2, "0");
  return y + "-" + m + "-" + day;
}

/* =========================================================
   localStorage 저장/로드
   ========================================================= */
function persist() {
  try {
    const payload = JSON.stringify({ v: 2, nextId: nextId, items: store });
    localStorage.setItem(LS_KEY, payload);
    return true;
  } catch (e) {
    if (e && (e.name === "QuotaExceededError" || e.code === 22 || e.code === 1014)) {
      toast("저장 공간이 가득 찼어요. ‘백업저장’으로 백업한 뒤 일부를 정리해 주세요.", 5000);
    } else {
      toast("저장 중 문제가 생겼어요.");
    }
    return false;
  }
}

function loadStore() {
  let raw = null;
  try { raw = localStorage.getItem(LS_KEY); } catch (e) { raw = null; }
  if (!raw) return;
  let obj = null;
  try { obj = JSON.parse(raw); } catch (e) { obj = null; }
  if (!obj || !Array.isArray(obj.items)) return;
  for (const it of obj.items) {
    if (!it || typeof it !== "object") continue;
    if (!it.image) continue;
    store.push({
      id: typeof it.id === "number" ? it.id : nextId++,
      image: it.image,
      original: it.original || it.image,
      mask: it.mask || null,
      name: typeof it.name === "string" ? it.name : "",
      location: typeof it.location === "string" ? it.location : "",
      note: typeof it.note === "string" ? it.note : "",
      date: typeof it.date === "string" ? it.date : todayStr(it.createdAt),
      createdAt: typeof it.createdAt === "number" ? it.createdAt : Date.now(),
      serialNo: typeof it.serialNo === "number" ? it.serialNo : meta.nextSerialNo++,
      rarity: (it.rarity === "epic" || it.rarity === "rare" || it.rarity === "common") ? it.rarity : "common"
    });
  }
  let maxId = 0;
  for (const it of store) if (it.id > maxId) maxId = it.id;
  nextId = Math.max(typeof obj.nextId === "number" ? obj.nextId : 0, maxId + 1);
}

/* =========================================================
   백업 내보내기 / 불러오기 (JSON) — 갤러리 사진 가져오기와 별개
   ========================================================= */
function exportJSON() {
  if (store.length === 0) { toast("백업할 채집물이 없어요."); return; }
  const payload = JSON.stringify({ v: 2, exportedAt: Date.now(), items: store }, null, 0);
  const blob = new Blob([payload], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const stamp = todayStr();
  a.href = url;
  a.download = "채집도감_" + stamp + ".json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
  toast("백업 파일을 내보냈어요.");
}

function importJSONFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    let obj = null;
    try { obj = JSON.parse(String(reader.result)); } catch (e) { obj = null; }
    if (!obj || !Array.isArray(obj.items)) {
      toast("파일을 읽지 못했어요. 올바른 도감 파일인지 확인해 주세요.");
      return;
    }
    let added = 0;
    let maxId = 0;
    for (const it of store) if (it.id > maxId) maxId = it.id;
    for (const it of obj.items) {
      if (!it || !it.image) continue;
      const newIt = {
        id: ++maxId,
        image: it.image,
        original: it.original || it.image,
        mask: it.mask || null,
        name: typeof it.name === "string" ? it.name : "",
        location: typeof it.location === "string" ? it.location : "",
        note: typeof it.note === "string" ? it.note : "",
        date: typeof it.date === "string" ? it.date : todayStr(it.createdAt),
        createdAt: typeof it.createdAt === "number" ? it.createdAt : Date.now(),
        serialNo: typeof it.serialNo === "number" ? it.serialNo : meta.nextSerialNo++,
        rarity: (it.rarity === "epic" || it.rarity === "rare" || it.rarity === "common") ? it.rarity : "common"
      };
      store.push(newIt);
      ensureNat(newIt);
      added++;
    }
    nextId = maxId + 1;
    const ok = persist();
    updateInvBadge(true);
    invCountLabel.textContent = store.length + "개";
    if (Phys.open) refreshInventoryView();
    toast(added + "개를 불러왔어요." + (ok ? "" : " (저장 공간 부족)"));
  };
  reader.onerror = () => toast("파일을 읽지 못했어요.");
  reader.readAsText(file);
}

});
